<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FlowGuard — Operations Center</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800;900&family=Figtree:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --navy:          #0a2a3d;
      --navy-mid:      #0d3a54;
      --navy-deep:     #061824;
      --blue:          #16a8d3;
      --blue-hi:       #1cb8e8;
      --amber:         #f5a623;
      --teal:          #0d7fa0;
      --sky:           #cceeff;
      --canvas:        #eef4f8;
      --surface:       #ffffff;
      --surface-2:     #f4f9fc;
      --surface-h:     #eaf4f9;
      --border:        #d4e8f2;
      --border-2:      #96c2d6;
      --accent-glow:   rgba(22,168,211,.13);
      --accent-lt:     rgba(22,168,211,.08);
      --ok:    #0a8a6a;  --ok-bg:  #e3f5ef;
      --warn:  #b45309;  --wb:     #fef3c7;
      --caut:  #c2410c;  --cb:     #fff0eb;
      --err:   #dc2626;  --eb:     #fef2f2;
      --off:   #6b7280;  --ob:     #f3f4f6;
      --ambb:  rgba(245,166,35,.1);
      --text:  #0a2a3d;
      --text2: #3d6070;
      --text3: #7ea8ba;
      --sh-xs: 0 1px 2px rgba(10,42,61,.05);
      --sh-sm: 0 2px 6px rgba(10,42,61,.07);
      --sh-md: 0 4px 16px rgba(10,42,61,.09);
      --sh-lg: 0 16px 48px rgba(10,42,61,.12), 0 4px 12px rgba(10,42,61,.06);
      --sw:    264px;
      --th:    58px;
      --r:     10px; --rs: 6px; --rl: 14px;
      --ff-d: 'Playfair Display', Georgia, serif;
      --ff-b: 'Figtree', system-ui, sans-serif;
      --ff-m: 'JetBrains Mono', monospace;
      /* Legacy aliases for JS modules */
      --neon: var(--blue); --neon-dim: var(--teal);
      --neon-glow: var(--accent-glow); --neon-trace: rgba(22,168,211,.04);
      --bg: var(--canvas); --surface: var(--surface);
      --panel: var(--surface-2); --panel-edge: var(--border);
      --panel-hover: var(--surface-h);
      --text-bright: var(--text); --text-mid: var(--text2); --text-dim: var(--text3);
      --s-nominal: var(--ok); --s-watch: var(--warn);
      --s-warning: var(--caut); --s-critical: var(--err); --s-offline: var(--off);
      --font-display: var(--ff-d); --font-mono: var(--ff-m);
    }

    html { height: 100%; }
    body {
      height: 100%; background: var(--canvas);
      color: var(--text); font-family: var(--ff-b);
      font-size: 14px; display: flex; flex-direction: column; overflow: hidden;
    }

    .app { flex: 1; display: flex; overflow: hidden; }

    /* ══════════════════════════════════════════════
       SIDEBAR
    ══════════════════════════════════════════════ */
    .sidebar {
      width: var(--sw);
      flex-shrink: 0;
      background: var(--navy-deep);
      display: flex; flex-direction: column;
      height: 100%; overflow: hidden;
      position: relative;
    }

    /* Water depth atmosphere */
    .sidebar::before {
      content: '';
      position: absolute; bottom: 0; left: 0; right: 0; height: 45%;
      background: radial-gradient(ellipse 130% 55% at 50% 115%, rgba(13,127,160,.2) 0%, transparent 60%);
      pointer-events: none; z-index: 0;
    }

    /* ── Brand ── */
    .sb-top {
      flex-shrink: 0;
      padding: 0 20px;
      position: relative; z-index: 1;
    }

    .sb-brand {
      padding: 20px 0 16px;
      border-bottom: 1px solid rgba(255,255,255,.055);
      display: flex; align-items: center; gap: 12px;
    }

    .sb-mark { width: 36px; height: 36px; flex-shrink: 0; }

    .sb-name {
      font-family: var(--ff-d);
      font-size: .98rem; font-weight: 700;
      color: rgba(255,255,255,.92);
      white-space: nowrap; letter-spacing: .01em;
    }

    .sb-sub {
      font-size: .59rem; font-weight: 700;
      letter-spacing: 2px; text-transform: uppercase;
      color: var(--blue); margin-top: 1px;
    }

    /* ── Nav ── */
    .sb-nav { flex: 1; overflow-y: auto; overflow-x: hidden; padding: 8px 0; position: relative; z-index: 1; }
    .sb-nav::-webkit-scrollbar { width: 0; }

    .nav-sect {
      padding: 16px 22px 4px;
      font-size: .58rem; font-weight: 700;
      letter-spacing: 2px; text-transform: uppercase;
      color: rgba(255,255,255,.2);
    }

    .nav-item {
      display: flex; align-items: center; gap: 11px;
      padding: 9px 20px 9px 22px;
      margin: 1px 10px;
      border-radius: var(--rs);
      cursor: pointer; border: none;
      background: transparent;
      width: calc(100% - 20px);
      text-align: left;
      color: rgba(255,255,255,.45);
      font-family: var(--ff-b);
      font-size: .83rem; font-weight: 500;
      transition: background .14s, color .14s;
      position: relative;
    }

    .nav-item:hover { background: rgba(255,255,255,.065); color: rgba(255,255,255,.84); }

    .nav-item.active {
      background: rgba(22,168,211,.13);
      color: var(--blue); font-weight: 600;
      border: 1px solid rgba(22,168,211,.2);
    }

    /* Left accent line for active */
    .nav-item.active::before {
      content: '';
      position: absolute;
      left: -10px; top: 22%; bottom: 22%;
      width: 2.5px;
      background: var(--blue);
      border-radius: 0 2px 2px 0;
    }

    .nav-icon {
      width: 15px; height: 15px;
      flex-shrink: 0; color: rgba(255,255,255,.25);
      transition: color .14s;
    }
    .nav-item:hover .nav-icon { color: rgba(255,255,255,.6); }
    .nav-item.active .nav-icon { color: var(--blue); }
    .nav-label { flex: 1; }

    .nav-badge {
      background: var(--err); color: white;
      font-size: 9px; font-weight: 700;
      padding: 1px 6px; border-radius: 10px;
      font-family: var(--ff-m);
    }

    /* ── User footer ── */
    .sb-foot {
      flex-shrink: 0;
      padding: 10px 14px 16px;
      border-top: 1px solid rgba(255,255,255,.055);
      position: relative; z-index: 1;
    }

    .user-chip {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 12px;
      background: rgba(255,255,255,.04);
      border: 1px solid rgba(255,255,255,.07);
      border-radius: var(--r); margin-bottom: 8px;
    }

    .user-av {
      width: 34px; height: 34px;
      background: linear-gradient(135deg, var(--blue), var(--teal));
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 700; color: white;
      flex-shrink: 0; font-family: var(--ff-m);
      letter-spacing: .5px;
    }

    .user-name { font-size: .82rem; font-weight: 600; color: rgba(255,255,255,.88); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .user-role-el { font-size: .67rem; color: rgba(255,255,255,.3); margin-top: 1px; }

    .btn-logout {
      width: 100%; padding: 8px;
      background: transparent;
      border: 1px solid rgba(255,255,255,.07);
      border-radius: var(--rs);
      color: rgba(255,255,255,.35);
      font-family: var(--ff-b); font-size: .77rem; font-weight: 500;
      cursor: pointer; transition: all .2s;
      display: flex; align-items: center; justify-content: center; gap: 7px;
    }
    .btn-logout:hover { border-color: rgba(220,38,38,.45); color: rgba(255,130,130,.85); background: rgba(220,38,38,.07); }

    /* ══════════════════════════════════════════════
       MAIN AREA
    ══════════════════════════════════════════════ */
    .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

    /* ── Topbar ── */
    .topbar {
      height: var(--th);
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center;
      justify-content: space-between;
      padding: 0 28px; flex-shrink: 0;
      box-shadow: var(--sh-xs); position: relative; z-index: 10;
    }

    .tb-left { display: flex; align-items: center; gap: 10px; }

    .tb-module {
      font-size: .72rem; font-weight: 600; letter-spacing: .5px;
      color: var(--text3); text-transform: uppercase;
    }
    .tb-sep { color: var(--border-2); font-size: 13px; }
    .tb-title {
      font-family: var(--ff-d);
      font-size: .98rem; font-weight: 700;
      color: var(--text); letter-spacing: -.01em;
    }

    .tb-right { display: flex; align-items: center; gap: 10px; }

    #demo-pill {
      display: none; align-items: center; gap: 6px;
      padding: 4px 12px;
      background: var(--ambb);
      border: 1px solid rgba(245,166,35,.35);
      border-radius: 20px;
      font-size: .66rem; font-weight: 700;
      letter-spacing: 1.2px; text-transform: uppercase;
      color: var(--amber);
    }
    #demo-pill.visible { display: flex; }

    #current-time {
      font-family: var(--ff-m);
      font-size: .71rem; color: var(--text3); letter-spacing: .3px;
    }

    .tb-btn {
      width: 36px; height: 36px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--rs);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; color: var(--text2);
      transition: all .18s; position: relative;
    }
    .tb-btn:hover {
      border-color: var(--blue); color: var(--blue);
      background: var(--accent-lt); transform: translateY(-1px); box-shadow: var(--sh-sm);
    }
    .tb-btn .badge {
      position: absolute; top: -5px; right: -5px;
      background: var(--err); color: white;
      width: 16px; height: 16px; border-radius: 50%;
      font-size: 9px; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      font-family: var(--ff-m); border: 1.5px solid var(--surface);
    }

    /* ── Content ── */
    .content {
      flex: 1; overflow-y: auto; overflow-x: hidden; padding: 28px;
    }
    .content::-webkit-scrollbar { width: 5px; }
    .content::-webkit-scrollbar-track { background: transparent; }
    .content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    .content::-webkit-scrollbar-thumb:hover { background: var(--border-2); }

    .tab-content { display: none; }
    .tab-content.active { display: block; animation: tabIn .22s ease; }
    @keyframes tabIn { from{opacity:0;transform:translateY(7px);}to{opacity:1;transform:translateY(0);} }
    @media (prefers-reduced-motion: reduce) { .tab-content.active { animation: none; } }

    /* ══════════════════════════════════════════════
       ALERT TRAY
    ══════════════════════════════════════════════ */
    .alert-panel {
      position: fixed; top: var(--th); right: -360px;
      width: 340px; bottom: 0;
      background: var(--surface); border-left: 1px solid var(--border);
      z-index: 200; transition: right .3s cubic-bezier(.4,0,.2,1);
      display: flex; flex-direction: column;
    }
    .alert-panel.open { right: 0; box-shadow: var(--sh-lg); }
    .alert-panel-header {
      padding: 18px 20px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .alert-panel-title { font-family: var(--ff-d); font-size: .95rem; font-weight: 700; color: var(--text); }
    .alert-panel-close { background: none; border: none; color: var(--text3); cursor: pointer; font-size: 16px; padding: 4px 6px; border-radius: 4px; transition: all .2s; }
    .alert-panel-close:hover { color: var(--err); background: var(--eb); }
    .alert-panel-body { flex: 1; overflow-y: auto; padding: 14px; }

    /* ══════════════════════════════════════════════
       COMPONENT LIBRARY (consumed by all modules)
    ══════════════════════════════════════════════ */
    .modern-card,.ops-card { background:var(--surface); border-radius:var(--r); border:1px solid var(--border); box-shadow:var(--sh-xs); }
    .ops-card-header { padding:14px 20px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
    .ops-card-title { font-family:var(--ff-d); font-size:.9rem; font-weight:700; color:var(--text); }
    .ops-card-body { padding:18px 20px; }

    .status-badge { display:inline-flex; align-items:center; gap:5px; padding:3px 10px; border-radius:20px; font-size:.69rem; font-weight:700; letter-spacing:.4px; }
    .status-badge.nominal  { background:var(--ok-bg); color:var(--ok); }
    .status-badge.watch    { background:var(--wb);    color:var(--warn); }
    .status-badge.warning  { background:var(--cb);    color:var(--caut); }
    .status-badge.critical { background:var(--eb);    color:var(--err); }
    .status-badge.offline  { background:var(--ob);    color:var(--off); }

    .metric-tile {
      background:var(--surface); border:1px solid var(--border);
      border-radius:var(--r); padding:18px; position:relative;
      overflow:hidden; box-shadow:var(--sh-xs);
      transition:box-shadow .2s, border-color .2s, transform .15s;
    }
    .metric-tile:hover { box-shadow:var(--sh-md); border-color:var(--border-2); transform:translateY(-2px); }
    .metric-tile::after { content:''; position:absolute; bottom:0; left:0; right:0; height:3px; background:linear-gradient(90deg,var(--navy),var(--blue)); opacity:.5; }
    .metric-tile.watch::after { background:var(--warn); opacity:.7; }
    .metric-tile.crit::after  { background:var(--err); opacity:.8; }
    .metric-label { font-size:.67rem; font-weight:700; letter-spacing:1px; text-transform:uppercase; color:var(--text3); margin-bottom:9px; }
    .metric-value { font-family:var(--ff-d); font-size:2rem; font-weight:800; color:var(--text); letter-spacing:-.02em; line-height:1; }
    .metric-sub { font-size:.71rem; color:var(--text3); margin-top:5px; }

    .ops-table { width:100%; border-collapse:collapse; }
    .ops-table th { padding:11px 16px; text-align:left; font-size:.67rem; font-weight:700; letter-spacing:1px; text-transform:uppercase; color:var(--text3); border-bottom:1.5px solid var(--border); }
    .ops-table td { padding:12px 16px; font-size:.85rem; color:var(--text2); border-bottom:1px solid var(--border); transition:background .1s; }
    .ops-table tr:last-child td { border-bottom:none; }
    .ops-table tr:hover td { background:var(--surface-h); }
    .ops-table td.bright { color:var(--text); font-weight:600; }

    .btn-primary { padding:9px 18px; background:var(--navy); border:none; border-radius:var(--rs); color:white; font-family:var(--ff-b); font-size:.82rem; font-weight:700; cursor:pointer; transition:background .18s,box-shadow .2s,transform .15s; display:inline-flex; align-items:center; gap:7px; }
    .btn-primary:hover { background:var(--navy-mid); box-shadow:0 4px 14px rgba(10,42,61,.25); transform:translateY(-1px); }
    .btn-ghost { padding:8px 16px; background:var(--surface-2); border:1px solid var(--border); border-radius:var(--rs); color:var(--text2); font-family:var(--ff-b); font-size:.82rem; font-weight:500; cursor:pointer; transition:all .18s; display:inline-flex; align-items:center; gap:7px; }
    .btn-ghost:hover { border-color:var(--blue); color:var(--blue); background:var(--accent-lt); }
    .btn-secondary { padding:8px 16px; background:var(--surface-2); border:1px solid var(--border); border-radius:var(--rs); color:var(--text2); font-family:var(--ff-b); font-size:.82rem; font-weight:500; cursor:pointer; transition:all .18s; display:inline-flex; align-items:center; gap:7px; }
    .btn-secondary:hover { border-color:var(--border-2); color:var(--text); }
    .btn-danger { padding:8px 16px; background:var(--eb); border:1px solid var(--err); border-radius:var(--rs); color:var(--err); font-family:var(--ff-b); font-size:.82rem; font-weight:600; cursor:pointer; transition:all .18s; }
    .btn-danger:hover { background:var(--err); color:white; }
    .btn-table-action { width:30px; height:30px; background:var(--surface-2); border:1px solid var(--border); border-radius:var(--rs); display:inline-flex; align-items:center; justify-content:center; cursor:pointer; color:var(--text3); transition:all .18s; }
    .btn-table-action:hover { border-color:var(--blue); color:var(--blue); background:var(--accent-lt); transform:translateY(-1px); }

    .ops-input,.input-field { background:var(--surface-2); border:1px solid var(--border); border-radius:var(--rs); padding:9px 13px; font-family:var(--ff-b); font-size:.85rem; color:var(--text); outline:none; transition:border-color .2s,box-shadow .2s,background .2s; width:100%; }
    .ops-input::placeholder,.input-field::placeholder { color:var(--text3); }
    .ops-input:focus,.input-field:focus { border-color:var(--blue); background:var(--surface); box-shadow:0 0 0 3px var(--accent-glow); }
    .ops-label { display:block; font-size:.67rem; font-weight:700; letter-spacing:1px; text-transform:uppercase; color:var(--text3); margin-bottom:6px; }

    .loading { width:22px; height:22px; border:2px solid var(--border); border-top-color:var(--blue); border-radius:50%; animation:spin .75s linear infinite; }
    @keyframes spin { to{transform:rotate(360deg);} }

    /* Modal */
    .ops-modal-overlay { position:fixed; inset:0; background:rgba(10,42,61,.45); backdrop-filter:blur(4px); z-index:10000; display:flex; align-items:center; justify-content:center; opacity:0; transition:opacity .2s; padding:24px; }
    .ops-modal-overlay.visible { opacity:1; }
    .ops-modal { background:var(--surface); border:1px solid var(--border); border-radius:var(--rl); width:100%; max-width:560px; max-height:85vh; display:flex; flex-direction:column; box-shadow:var(--sh-lg); transform:scale(.97) translateY(8px); transition:transform .22s; }
    .ops-modal-overlay.visible .ops-modal { transform:scale(1) translateY(0); }
    .ops-modal-header { padding:18px 22px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
    .ops-modal-title { font-family:var(--ff-d); font-size:1.05rem; font-weight:700; color:var(--text); }
    .ops-modal-close { background:none; border:none; color:var(--text3); cursor:pointer; font-size:16px; padding:4px 8px; border-radius:4px; transition:all .2s; }
    .ops-modal-close:hover { color:var(--err); background:var(--eb); }
    .ops-modal-body { padding:22px; overflow-y:auto; flex:1; }
    .ops-modal-body::-webkit-scrollbar { width:4px; }
    .ops-modal-body::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }
    .ops-modal-footer { padding:14px 22px; border-top:1px solid var(--border); display:flex; justify-content:flex-end; gap:8px; flex-shrink:0; }
    .ops-modal-field { margin-bottom:14px; }
    .ops-modal-field:last-child { margin-bottom:0; }
    .ops-modal-detail { display:flex; justify-content:space-between; padding:9px 0; border-bottom:1px solid var(--border); }
    .ops-modal-detail:last-child { border-bottom:none; }
    .ops-modal-detail .label { font-size:.78rem; color:var(--text3); }
    .ops-modal-detail .value { font-size:.85rem; color:var(--text); font-weight:600; }

    /* Toast */
    .ops-toast { position:fixed; top:72px; right:20px; background:var(--surface); border:1px solid var(--border); border-left-width:3px; padding:13px 18px; border-radius:var(--r); display:flex; align-items:center; gap:11px; z-index:10001; box-shadow:var(--sh-md); animation:toastIn .3s ease; }
    @keyframes toastIn { from{opacity:0;transform:translateY(-8px) translateX(8px);}to{opacity:1;transform:translateY(0) translateX(0);} }

    /* Pulse dots */
    .pulse-dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; }
    .pulse-dot.nominal { background:var(--ok); }
    .pulse-dot.watch   { background:var(--warn); }
    .pulse-dot.warning { background:var(--caut); }
    .pulse-dot.critical{ background:var(--err); }
    .pulse-dot.offline { background:var(--off); }

    /* Utility */
    .hidden{display:none!important;}
    .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
    .grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;}
    .grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;}
    .mb-4{margin-bottom:16px;} .mb-6{margin-bottom:24px;}
    .section-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
    .section-title{font-family:var(--ff-d);font-size:1rem;font-weight:700;color:var(--text);}
    .section-sub{font-size:.74rem;color:var(--text3);margin-top:2px;}

    /* ══════════════════════════════════════════════
       WELCOME STATE (shown when no module renders)
    ══════════════════════════════════════════════ */
    .welcome-state {
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    /* Greeting bar */
    .greeting-bar {
      background: var(--navy-deep);
      border-radius: var(--rl);
      padding: 28px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: relative;
      overflow: hidden;
    }

    .greeting-bar::before {
      content: '';
      position: absolute; inset: 0;
      background:
        radial-gradient(ellipse 80% 80% at 105% 120%, rgba(13,127,160,.45) 0%, transparent 50%),
        radial-gradient(ellipse 50% 60% at -5% -10%, rgba(22,168,211,.08) 0%, transparent 45%);
      pointer-events: none;
    }

    .greeting-grid {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(22,168,211,.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(22,168,211,.025) 1px, transparent 1px);
      background-size: 48px 48px;
    }

    .greeting-text { position: relative; z-index: 1; }

    .greeting-hello {
      font-size: .7rem; font-weight: 700;
      letter-spacing: 2px; text-transform: uppercase;
      color: var(--blue); margin-bottom: 6px;
    }

    .greeting-name {
      font-family: var(--ff-d);
      font-size: 1.7rem; font-weight: 800;
      color: #ffffff;
      letter-spacing: -.02em; line-height: 1.1;
      margin-bottom: 6px;
    }

    .greeting-sub {
      font-size: .83rem; color: rgba(255,255,255,.48);
      line-height: 1.5;
    }

    .greeting-mark {
      width: 80px; height: 80px;
      flex-shrink: 0; position: relative; z-index: 1;
      opacity: .7;
    }

    /* Quick action tiles */
    .quick-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
    }

    .quick-tile {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 20px 18px;
      cursor: pointer;
      transition: all .18s;
      display: flex; flex-direction: column; gap: 12px;
      box-shadow: var(--sh-xs);
      position: relative;
      overflow: hidden;
    }

    .quick-tile::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 2.5px;
      background: var(--border);
      transition: background .18s;
    }

    .quick-tile:hover {
      border-color: var(--blue);
      transform: translateY(-3px);
      box-shadow: var(--sh-md);
    }

    .quick-tile:hover::after { background: var(--blue); }

    .qt-icon {
      width: 38px; height: 38px;
      border-radius: 9px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }

    .qt-label {
      font-size: .82rem; font-weight: 700;
      color: var(--text);
    }

    .qt-sub {
      font-size: .71rem; color: var(--text3);
      margin-top: 2px; line-height: 1.4;
    }

    /* Two-column lower section */
    .lower-grid {
      display: grid;
      grid-template-columns: 1fr 320px;
      gap: 18px;
    }

    /* Platform status card */
    .status-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r);
      box-shadow: var(--sh-xs);
      overflow: hidden;
    }

    .status-card-head {
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center;
      justify-content: space-between;
    }

    .status-card-title {
      font-family: var(--ff-d);
      font-size: .9rem; font-weight: 700; color: var(--text);
    }

    .status-row {
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center;
      justify-content: space-between;
      transition: background .12s;
    }

    .status-row:last-child { border-bottom: none; }
    .status-row:hover { background: var(--surface-h); }

    .status-row-left { display: flex; align-items: center; gap: 12px; }

    .status-dot-ring {
      width: 10px; height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .status-row-label { font-size: .84rem; font-weight: 500; color: var(--text); }
    .status-row-sub   { font-size: .72rem; color: var(--text3); margin-top: 1px; }
    .status-row-val   { font-family: var(--ff-m); font-size: .78rem; color: var(--text2); }

    /* DaaS summary card */
    .daas-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r);
      box-shadow: var(--sh-xs);
      overflow: hidden;
    }

    .daas-head {
      padding: 14px 18px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }

    .daas-head-title { font-family: var(--ff-d); font-size: .9rem; font-weight: 700; color: var(--text); }

    .daas-metric {
      padding: 14px 18px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }

    .daas-metric:last-child { border-bottom: none; }

    .daas-metric-label {
      font-size: .78rem; color: var(--text2); font-weight: 500;
    }

    .daas-metric-val {
      font-family: var(--ff-d);
      font-size: 1.15rem; font-weight: 800;
      color: var(--text); letter-spacing: -.01em;
    }

    .daas-metric-val.blue { color: var(--blue); }
    .daas-metric-val.amber { color: var(--amber); }

    /* ── Responsive ── */
    @media (max-width: 1100px) {
      .quick-grid { grid-template-columns: repeat(2, 1fr); }
      .lower-grid { grid-template-columns: 1fr; }
    }

    @media (max-width: 900px) {
      :root { --sw: 54px; }
      .sb-brand .sb-name, .sb-brand .sb-sub,
      .nav-label, .nav-badge,
      .user-info, .btn-logout { display: none; }
      .sb-brand { justify-content: center; padding: 14px 0 12px; }
      .nav-item { justify-content: center; padding: 12px; margin: 1px 4px; width: calc(100% - 8px); }
      .nav-item.active::before { display: none; }
      .nav-sect { display: none; }
      .user-chip { padding: 8px; justify-content: center; }
      .greeting-mark { display: none; }
      .greeting-bar { padding: 22px 24px; }
    }

    @media (max-width: 600px) {
      .content { padding: 16px; }
      .quick-grid { grid-template-columns: 1fr 1fr; gap: 10px; }
      .greeting-name { font-size: 1.35rem; }
    }
  </style>
</head>

              <div class="status-row-left">
                <div class="status-dot-ring" style="background:var(--ok);box-shadow:0 0 0 3px var(--ok-bg);"></div>
                <div>
                  <div class="status-row-label">Client Portal</div>
                  <div class="status-row-sub">app.flowguard.ng</div>
                </div>
              </div>
              <div class="status-row-val">Operational</div>
            </div>
          </div>

          <!-- DaaS quick summary -->
          <div class="daas-card">
            <div class="daas-head">
              <div class="daas-head-title">Service Overview</div>
            </div>
            <div class="daas-metric">
              <div class="daas-metric-label">Active Deployments</div>
              <div class="daas-metric-val blue" id="ws-sites">—</div>
            </div>
            <div class="daas-metric">
              <div class="daas-metric-label">Sensors Online</div>
              <div class="daas-metric-val" id="ws-sensors">—</div>
            </div>
            <div class="daas-metric">
              <div class="daas-metric-label">Open Incidents</div>
              <div class="daas-metric-val amber" id="ws-alerts">—</div>
            </div>
            <div class="daas-metric">
              <div class="daas-metric-label">SLA Compliance</div>
              <div class="daas-metric-val" id="ws-sla">—</div>
            </div>
            <div class="daas-metric">
              <div class="daas-metric-label">Monthly Revenue</div>
              <div class="daas-metric-val" id="ws-mrr">—</div>
            </div>
          </div>

        </div>
      </div>
    `;

    // Pull live data into the summary
    loadWelcomeKPIs();
  }

  async function loadWelcomeKPIs() {
    try {
      if (typeof OpsModal === 'undefined') return;
      const res  = await OpsModal.apiGet('/analytics/kpis');
      const kpis = res.data || {};
      const set = (id, val) => { const el = document.getElementById(id); if (el) el.textContent = val; };
      set('ws-sites',   kpis.activeSites    ?? '—');
      set('ws-sensors', kpis.sensorsOnline?.online != null ? `${kpis.sensorsOnline.online}/${kpis.sensorsOnline.total}` : '—');
      set('ws-alerts',  kpis.activeAlerts   ?? '—');
      set('ws-sla',     kpis.networkUptime  != null ? kpis.networkUptime + '%' : '—');
      set('ws-mrr',     kpis.mrr            != null ? '₦' + Number(kpis.mrr).toLocaleString() : '—');
    } catch { /* silent — welcome state shows dashes */ }
  }

  const TAB_MODULES = {
    dashboard:      () => typeof OpsDashboard      !== 'undefined' && OpsDashboard,
    clients:        () => typeof OpsClients        !== 'undefined' && OpsClients,
    properties:     () => typeof OpsProperties     !== 'undefined' && OpsProperties,
    alerts:         () => typeof OpsAlerts         !== 'undefined' && OpsAlerts,
    teams:          () => typeof OpsTeams          !== 'undefined' && OpsTeams,
    'team-members': () => typeof OpsUserManagement !== 'undefined' && OpsUserManagement,
    reports:        () => typeof OpsReports        !== 'undefined' && OpsReports,
    settings:       () => typeof OpsSettings       !== 'undefined' && OpsSettings,
  };

  function applyRoleNav() {
    ALL_TABS.forEach(tab => {
      const btn = document.getElementById(`nav-${tab}`);
      if (btn) btn.style.display = Auth.hasNavAccess(tab) ? '' : 'none';
    });
    document.querySelectorAll('.nav-sect').forEach(sec => {
      let el = sec.nextElementSibling, vis = false;
      while (el && !el.classList.contains('nav-sect')) {
        if (el.style.display !== 'none') { vis = true; break; }
        el = el.nextElementSibling;
      }
      sec.style.display = vis ? '' : 'none';
    });
  }

  function switchTab(name) {
    if (!Auth.hasNavAccess(name)) return;
    ALL_TABS.forEach(t => {
      document.getElementById(`content-${t}`)?.classList.remove('active');
      document.getElementById(`nav-${t}`)?.classList.remove('active');
    });
    document.getElementById(`content-${name}`)?.classList.add('active');
    document.getElementById(`nav-${name}`)?.classList.add('active');
    const m = TAB_META[name] || {};
    document.getElementById('topbar-module').textContent = m.module || name;
    document.getElementById('topbar-title').textContent  = m.title  || name;
    renderTab(name);
  }

  function renderTab(name) {
    const c = document.getElementById(`content-${name}`);
    if (!c || c.hasAttribute('data-rendered')) return;
    if (name === 'dashboard') {
      const mod = TAB_MODULES[name]();
      if (mod) { mod.render(c); }
      else { renderWelcome(c); }
    } else {
      const mod = TAB_MODULES[name]?.();
      if (mod) mod.render(c);
    }
    c.setAttribute('data-rendered', 'true');
  }

  function reloadTab(name) {
    const c = document.getElementById(`content-${name}`);
    if (c) { c.removeAttribute('data-rendered'); c.innerHTML = ''; }
    renderTab(name);
  }

  function toggleAlertPanel() { document.getElementById('alertPanel').classList.toggle('open'); }

  function updateAlertCount(n) {
    const b = document.getElementById('nav-badge-alerts');
    const t = document.getElementById('topbar-alert-badge');
    if (n > 0) {
      if (b) { b.textContent = n; b.style.display = 'inline-flex'; }
      if (t) { t.textContent = n; t.style.display = 'flex'; }
    } else {
      if (b) b.style.display = 'none';
      if (t) t.style.display = 'none';
    }
  }

  function updateSysBar() {
    if (typeof OpsStateManager === 'undefined') return;
    try { const s = OpsStateManager.getState?.(); if (s?.alerts !== undefined) updateAlertCount(s.alerts); } catch {}
  }

  function updateClock() {
    const now = new Date();
    const d = now.toLocaleDateString('en-GB', { weekday:'short', day:'numeric', month:'short' });
    const t = now.toLocaleTimeString([], { hour:'2-digit', minute:'2-digit', second:'2-digit' });
    document.getElementById('current-time').textContent = `${d} · ${t}`;
  }

  function handleLogout() {
    OpsModal.confirm('Sign out of FlowGuard Operations Center?', () => Auth.logout());
  }

  document.addEventListener('DOMContentLoaded', () => {
    Auth.updateUserInfo();
    applyRoleNav();
    updateClock();
    setInterval(updateClock, 1000);
    setInterval(updateSysBar, 5000);
    renderTab(Auth.getDefaultTab());
    updateSysBar();
    if (typeof OpsStateManager !== 'undefined' && OpsStateManager.getDemoMode?.()) {
      document.getElementById('demo-pill').classList.add('visible');
    }
  });

  window.switchTab = switchTab;
  window.reloadTab = reloadTab;
  window.updateAlertCount = updateAlertCount;
</script>
</body>
</html>
