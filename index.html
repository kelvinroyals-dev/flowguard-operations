<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="favicon.ico" sizes="any">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="favicon-180.png">
  <title>FlowGuard — Operations Center</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      /* ══ COMMAND — dark-first theme ══ */

      /* ── Type scale (theme-independent — defined once, here only) ──
         One scale, used everywhere. Same size = same role, on every tab.
         Role guide:
           2xs  micro captions, uppercase eyebrow labels, tiny badges
           xs   table headers, meta/timestamp text, small captions
           sm   secondary body text, buttons/pills, filter controls
           base primary UI text — standard buttons, inputs, nav, form labels
           md   table/card body text — the "read this" data cell size
           lg   section/card titles, modal titles
           xl   module page headers (top of each tab)
           2xl  KPI / stat headline numbers — always this size, everywhere
           3xl  hero-level numbers (dashboard greeting strip only) */
      --fs-2xs:  .625rem;   /* 10px */
      --fs-xs:   .6875rem;  /* 11px */
      --fs-sm:   .75rem;    /* 12px */
      --fs-base: .8125rem;  /* 13px */
      --fs-md:   .875rem;   /* 14px */
      --fs-lg:   1rem;      /* 16px */
      --fs-xl:   1.25rem;   /* 20px */
      --fs-2xl:  1.75rem;   /* 28px */
      --fs-3xl:  2.25rem;   /* 36px */
      --fs-hero: clamp(1.9rem, 3vw, 2.6rem);

      /* ── Brand ── */
      --navy:       #0a1622;
      --navy-deep:  #070d14;
      --navy-mid:   #0e1c2a;
      --blue:       #06b6d4;
      --blue-hi:    #22d3ee;
      --blue-dim:   #0e7490;
      --amber:      #fbbf24;
      --teal:       #0e7490;

      /* ── Canvas & surfaces ── */
      --canvas:     #0a0f16;
      --surface:    #101a26;
      --surface-2:  #0c141d;
      --surface-3:  #15202d;
      --surface-h:  #16283a;
      --border:     #1c2c3d;
      --border-2:   #27394d;

      /* ── Text ── */
      --ink:        #e8f1f8;
      --ink-2:      #9db1c2;
      --ink-3:      #6a8095;
      --ink-4:      #47596b;

      /* ── Status ── */
      --ok:         #34d399;    --ok-bg:  rgba(52,211,153,.12);
      --warn:       #fbbf24;    --wb:     rgba(251,191,36,.12);
      --caut:       #fb923c;    --cb:     rgba(251,146,60,.12);
      --err:        #f87171;    --eb:     rgba(248,113,113,.12);
      --off:        #7d8fa3;    --ob:     rgba(125,143,163,.14);
      --amber-bg:   rgba(251,191,36,.08);
      --overlay:    rgba(12,20,29,.92);
      /* ── Sidebar: permanently dark in both themes ── */
      --sb-ink:    rgba(255,255,255,.92);
      --sb-ink-2:  rgba(255,255,255,.62);
      --sb-ink-3:  rgba(255,255,255,.38);
      --sb-ink-4:  rgba(255,255,255,.24);
      --sb-line:   rgba(255,255,255,.07);
      --sb-hover:  rgba(255,255,255,.06);


      /* ── Shadows / glow ── */
      --sh-xs: 0 1px 2px rgba(0,0,0,.4);
      --sh-sm: 0 2px 10px rgba(0,0,0,.35);
      --sh-md: 0 4px 24px rgba(0,0,0,.45);
      --sh-lg: 0 24px 70px rgba(0,0,0,.55);
      --sh-card: 0 0 0 1px rgba(34,211,238,.05), 0 2px 10px rgba(0,0,0,.35), 0 10px 30px rgba(0,0,0,.3);

      /* ── Layout ── */
      --sw:  204px;
      --th:  58px;

      /* ── Radii ── */
      --r:   14px; --rs: 9px; --rl: 20px;

      /* ── Fonts ── */
      --ff-d: 'Plus Jakarta Sans', system-ui, sans-serif;
      --ff-b: 'Plus Jakarta Sans', system-ui, sans-serif;
      --ff-m: 'JetBrains Mono', monospace;

      /* ── Legacy aliases for JS modules ── */
      --neon: var(--blue-hi); --neon-dim: var(--blue-dim);
      --neon-glow: rgba(34,211,238,.16); --neon-trace: rgba(34,211,238,.05);
      --bg: var(--canvas); --panel: var(--surface); --panel-edge: var(--border);
      --panel-hover: var(--surface-h);
      --text-bright: var(--ink); --text-mid: var(--ink-2); --text-dim: var(--ink-3);
      --s-nominal: var(--ok); --s-watch: var(--warn);
      --s-warning: var(--caut); --s-critical: var(--err); --s-offline: var(--off);
      --font-display: var(--ff-d); --font-mono: var(--ff-m);
    }

    /* ══ Light theme — the original operations palette ══ */
    html[data-theme="light"] {
      /* ── Brand (aligned to client portal) ── */
      --navy:       #0a2a3d;
      --navy-deep:  #071722;
      --navy-mid:   #0d3a54;
      --blue:       #0891b2;
      --blue-hi:    #06b6d4;
      --blue-dim:   #0e5b6e;
      --amber:      #f59e0b;
      --teal:       #0e5b6e;

      /* ── Canvas & surfaces (client portal) ── */
      --canvas:     #ffffff;
      --surface:    #ffffff;
      --surface-2:  #f8fbfc;
      --surface-3:  #eef4f8;
      --surface-h:  #e0f5fa;
      --border:     #e2e9ed;
      --border-2:   #d3dde2;

      /* ── Text (client portal) ── */
      --ink:        #12222b;
      --ink-2:      #4a626d;
      --ink-3:      #8399a4;
      --ink-4:      #a9bcc7;

      /* ── Status ── */
      --ok:         #0a8a6a;    --ok-bg:  #e2f5ee;
      --warn:       #b45309;    --wb:     #fef3c7;
      --caut:       #c2410c;    --cb:     #fff0eb;
      --err:        #dc2626;    --eb:     #fef2f2;
      --off:        #64748b;    --ob:     #f1f5f9;
      --amber-bg:   rgba(245,166,35,.09);
      --overlay:    rgba(255,255,255,.92);
      /* ── Sidebar: permanently dark in both themes ── */
      --sb-ink:    rgba(255,255,255,.92);
      --sb-ink-2:  rgba(255,255,255,.62);
      --sb-ink-3:  rgba(255,255,255,.38);
      --sb-ink-4:  rgba(255,255,255,.24);
      --sb-line:   rgba(255,255,255,.07);
      --sb-hover:  rgba(255,255,255,.06);


      /* ── Shadows ── */
      --sh-xs: 0 1px 2px rgba(10,31,46,.06);
      --sh-sm: 0 2px 8px rgba(10,31,46,.07), 0 1px 2px rgba(10,31,46,.04);
      --sh-md: 0 4px 20px rgba(10,31,46,.09), 0 2px 4px rgba(10,31,46,.05);
      --sh-lg: 0 20px 60px rgba(10,31,46,.12), 0 4px 12px rgba(10,31,46,.07);
      --sh-card: 0 0 0 1px rgba(10,31,46,.05), 0 2px 8px rgba(10,31,46,.06), 0 8px 24px rgba(10,31,46,.06);

      /* ── Layout ── */
      --sw:  204px;
      --th:  58px;

      /* ── Radii ── */
      --r:   14px; --rs: 9px; --rl: 20px;

      /* ── Fonts ── */
      --ff-d: 'Plus Jakarta Sans', system-ui, sans-serif;
      --ff-b: 'Plus Jakarta Sans', system-ui, sans-serif;
      --ff-m: 'JetBrains Mono', monospace;

      /* ── Legacy aliases for JS modules ── */
      --neon: var(--blue); --neon-dim: var(--teal);
      --neon-glow: rgba(8,145,178,.14); --neon-trace: rgba(8,145,178,.05);
      --bg: var(--canvas); --panel: var(--surface-2); --panel-edge: var(--border);
      --panel-hover: var(--surface-h);
      --text-bright: var(--ink); --text-mid: var(--ink-2); --text-dim: var(--ink-3);
      --s-nominal: var(--ok); --s-watch: var(--warn);
      --s-warning: var(--caut); --s-critical: var(--err); --s-offline: var(--off);
      --font-display: var(--ff-d); --font-mono: var(--ff-m);
    }

    .topbar { gap: 16px; overflow: visible; padding: 0 18px; min-width: 0; }
    .topbar > * { min-width: 0; }
    .topbar .tb-btn { flex-shrink: 0; }

    /* search — the only bordered element, like the sample */
    .tb-search { position: relative; display: flex; align-items: center; gap: 8px; background: var(--surface-2); border: 1px solid var(--border); border-radius: 9px; padding: 7px 11px; width: 260px; flex-shrink: 1; min-width: 130px; color: var(--ink-3); }
    .tb-search svg { width: 14px; height: 14px; flex-shrink: 0; }
    .tb-search input { flex: 1; min-width: 0; background: transparent; border: none; outline: none; color: var(--ink); font-family: var(--ff-b); font-size: var(--fs-sm); }
    .tb-search input::placeholder { color: var(--ink-4); }
    .tb-search kbd { flex-shrink: 0; font-family: var(--ff-m); font-size: var(--fs-2xs); color: var(--ink-4); background: var(--surface-3); border: 1px solid var(--border); border-radius: 5px; padding: 2px 5px; }
    .tb-search:focus-within { border-color: var(--blue-dim); }
    .tb-search-drop { position: absolute; top: calc(100% + 6px); left: 0; right: 0; background: var(--surface); border: 1px solid var(--border-2); border-radius: 10px; box-shadow: var(--sh-md); z-index: 900; display: none; overflow: hidden; max-height: 300px; overflow-y: auto; }
    .tbs-item { display: flex; align-items: center; gap: 9px; padding: 9px 12px; cursor: pointer; font-size: var(--fs-sm); color: var(--ink); border-bottom: 1px solid var(--border); }
    .tbs-item:hover { background: var(--surface-h); }
    .tbs-kind { font-size: var(--fs-2xs); font-weight: 800; letter-spacing: .8px; text-transform: uppercase; padding: 2px 6px; border-radius: 5px; background: var(--neon-trace); color: var(--blue-hi); }
    .tbs-sub { margin-left: auto; font-size: var(--fs-2xs); color: var(--ink-3); }

    /* cross-module relationship links (OpsModal.link) */
    .fg-link { color: var(--blue-hi); font-weight: 700; cursor: pointer; text-decoration: none; border-bottom: 1px solid transparent; transition: border-color .12s, opacity .12s; }
    .fg-link:hover, .fg-link:focus { border-bottom-color: var(--blue-hi); opacity: .9; outline: none; }
    .fg-link-block { display: inline-flex; align-items: center; gap: 6px; }
    .fg-link-none { color: var(--ink-3); font-weight: 600; }
    /* Global list-view (lv-*) styles are injected by ops-modal.js so they stay
       cache-busted; index.html itself has no ?v and would otherwise go stale. */

    /* storm banner — two-line, with action, like the sample */
    .tb-storm { display: flex; align-items: center; gap: 10px; padding: 6px 8px 6px 12px; border-radius: 9px; background: var(--eb); border: 1px solid rgba(248,113,113,.4); color: var(--err); flex-shrink: 1; min-width: 0; }
    .tb-storm > svg { width: 17px; height: 17px; flex-shrink: 0; }
    .tb-storm-txt { display: flex; flex-direction: column; line-height: 1.25; min-width: 0; }
    .tb-storm-txt b { font-size: var(--fs-sm); font-weight: 700; white-space: nowrap; }
    .tb-storm-txt i { font-size: var(--fs-xs); font-style: normal; color: var(--ink-2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .tb-storm-btn { flex-shrink: 0; padding: 5px 10px; border-radius: 7px; border: none; background: rgba(248,113,113,.18); color: var(--err); font-size: var(--fs-xs); font-weight: 700; font-family: var(--ff-b); cursor: pointer; white-space: nowrap; }
    .tb-storm-btn:hover { background: rgba(248,113,113,.3); }

    /* right cluster — borderless metrics, icon + stacked label/value */
    .tb-right { margin-left: auto; display: flex; align-items: center; gap: 18px; flex-shrink: 0; position: relative; }
    .tb-metric { display: flex; align-items: center; gap: 8px; white-space: nowrap; }
    .tb-mi { width: 22px; height: 22px; color: var(--ink-3); flex-shrink: 0; }
    .tb-mv { display: flex; flex-direction: column; line-height: 1.3; }
    .tb-mv b { font-size: var(--fs-base); font-weight: 600; color: var(--ink); }
    .tb-mv i { font-size: var(--fs-xs); font-style: normal; color: var(--ink-3); }
    .tb-mv em { font-style: normal; font-size: var(--fs-2xs); color: var(--ink-3); font-weight: 500; }
    #current-time { font-family: var(--ff-m); font-size: var(--fs-base); }

    /* user chip */
    .tb-user { position: relative; flex-shrink: 0; }
    .tb-user-btn { display: flex; align-items: center; gap: 9px; padding: 5px 10px 5px 5px; border-radius: 10px; border: 1px solid var(--border); background: var(--surface-2); color: var(--ink-3); cursor: pointer; }
    .tb-user-btn:hover { border-color: var(--border-2); }
    .tb-av { width: 30px; height: 30px; border-radius: 8px; background: var(--blue); color: #04222b; display: grid; place-items: center; font-size: var(--fs-xs); font-weight: 800; flex-shrink: 0; }
    .tb-user-txt { display: flex; flex-direction: column; line-height: 1.25; text-align: left; }
    .tb-user-txt b { font-size: var(--fs-sm); color: var(--ink); font-weight: 600; white-space: nowrap; }
    .tb-user-txt i { font-size: var(--fs-2xs); color: var(--ink-3); font-style: normal; white-space: nowrap; }
    .tb-user-menu { display: none; position: absolute; top: calc(100% + 8px); right: 0; min-width: 168px; background: var(--surface); border: 1px solid var(--border-2); border-radius: 11px; box-shadow: var(--sh-lg); overflow: hidden; z-index: 2000; }
    .tb-user-menu.open { display: block; }
    .tb-user-menu button { display: block; width: 100%; padding: 10px 14px; background: none; border: none; color: var(--ink-2); font-size: var(--fs-sm); font-family: var(--ff-b); cursor: pointer; text-align: left; }
    .tb-user-menu button:hover { background: var(--surface-h); color: var(--ink); }
    .tb-user-menu button.danger:hover { color: var(--err); }

    @media (max-width: 1250px) { .tb-metric:nth-of-type(1) .tb-mv { display: none; } }
    @media (max-width: 1080px) { .tb-user-txt { display: none; } .tb-search { width: 170px; } }


    /* ══ responsive shell ══ */
    @media (max-width: 1150px) {
      .tb-search { width: 180px; }
    }
    @media (max-width: 1000px) {
      :root { --sw: 62px; }
      .sidebar { width: 62px; overflow: visible; }
      .nav-label, .brand-name, .sb-brand-text, .nav-section, .sb-status { display: none; }
      .nav-item { justify-content: center; padding: 10px 0; margin: 2px 6px; width: calc(100% - 12px); }
      .nav-item .nav-icon { margin: 0; }
      .tb-metric:nth-of-type(1) { display: none; }
    }
    @media (max-width: 860px) {
      .topbar { padding: 0 12px; gap: 10px; }
      .tb-storm { display: none !important; }
      .tb-metric { display: none; }
      .tb-search { width: auto; flex: 1; min-width: 0; }
      .tb-user-txt { display: none; }
      .content { padding: 14px 12px; }
    }
    @media (max-width: 620px) {
      :root { --sw: 0px; }
      .app > .sidebar, aside.sidebar { position: fixed !important; left: 0; top: 0; bottom: 0; width: 210px !important; z-index: 1200; transform: translateX(-100%); transition: transform .22s; box-shadow: var(--sh-lg); }
      .app > .sidebar.open, aside.sidebar.open { transform: none; }
      .sidebar .nav-label, .sidebar .brand-name, .sidebar .sb-brand-text, .sidebar .nav-section { display: flex; }
      .sidebar .nav-item { justify-content: flex-start; padding: 9px 16px; }
      .mob-toggle { display: grid !important; }
      .tb-search kbd { display: none; }
    }
    .mob-toggle { display: none; place-items: center; width: 34px; height: 34px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface-2); color: var(--ink-2); cursor: pointer; flex-shrink: 0; }
    html { height: 100%; }
    body {
      height: 100%; background: var(--canvas);
      color: var(--ink); font-family: var(--ff-b);
      font-size: var(--fs-md); display: flex; flex-direction: column;
      overflow: hidden;
    }

    .app { flex: 1; display: flex; overflow: hidden; }

    /* ══════════════════════════════════════════════════════
       SIDEBAR — Premium instrument panel
    ══════════════════════════════════════════════════════ */
    .sidebar {
      width: var(--sw);
      flex-shrink: 0;
      background: var(--navy-deep);
      display: flex; flex-direction: column;
      height: 100%; overflow: hidden;
      position: relative;
    }

    /* Layered depth effects */
    .sidebar::before {
      content: '';
      position: absolute; inset: 0;
      background:
        radial-gradient(ellipse 100% 40% at 50% 100%, rgba(8,145,178,.14) 0%, transparent 60%),
        radial-gradient(ellipse 80% 30% at 50% 0%,   rgba(8,145,178,.05) 0%, transparent 50%);
      pointer-events: none; z-index: 0;
    }

    /* Fine noise texture — instrument panel feel */
    .sidebar::after {
      content: '';
      position: absolute; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
      background-size: 256px 256px;
      pointer-events: none; z-index: 0; opacity: .6;
    }

    /* ── Brand area ── */
    .sb-brand {
      position: relative; z-index: 1;
      padding: 20px 20px 16px;
      border-bottom: 1px solid var(--sb-line);
      display: flex; align-items: center; gap: 12px;
      flex-shrink: 0;
    }

    /* Brand mark with glow halo */
    .sb-mark-wrap {
      position: relative;
      width: 36px; height: 36px; flex-shrink: 0;
    }

    .sb-mark-wrap::before {
      content: '';
      position: absolute;
      inset: -4px;
      border-radius: 12px;
      background: radial-gradient(circle, rgba(22,168,211,.18) 0%, transparent 70%);
      animation: markGlow 3s ease-in-out infinite alternate;
    }

    @keyframes markGlow {
      0%   { opacity: .6; transform: scale(.95); }
      100% { opacity: 1;  transform: scale(1.05); }
    }

    .sb-mark { width: 36px; height: 36px; position: relative; z-index: 1; }

    .sb-brand-text { min-width: 0; }
    .sb-name {
      font-family: var(--ff-d);
      font-size: var(--fs-lg); font-weight: 700;
      color: var(--sb-ink);
      white-space: nowrap; letter-spacing: .01em;
    }
    .sb-sub {
      font-size: var(--fs-2xs); font-weight: 700;
      letter-spacing: 2.5px; text-transform: uppercase;
      color: var(--blue); margin-top: 1px;
      opacity: .9;
    }

    /* ── Live status pill in sidebar ── */
    .sb-status {
      position: relative; z-index: 1;
      margin: 12px 14px 6px;
      padding: 8px 12px;
      background: rgba(22,168,211,.07);
      border: 1px solid rgba(22,168,211,.12);
      border-radius: 8px;
      display: flex; align-items: center; gap: 8px;
      flex-shrink: 0;
    }

    .sb-status-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--blue); flex-shrink: 0;
      box-shadow: 0 0 0 3px rgba(22,168,211,.15);
      animation: statusPulse 2.5s ease-in-out infinite;
    }

    @keyframes statusPulse {
      0%,100% { box-shadow: 0 0 0 3px rgba(22,168,211,.15); }
      50%      { box-shadow: 0 0 0 5px rgba(22,168,211,.08); }
    }

    .sb-status-text {
      font-family: var(--ff-m);
      font-size: var(--fs-2xs); font-weight: 500;
      letter-spacing: .8px; text-transform: uppercase;
      color: var(--blue); opacity: .85;
    }

    /* ── Nav ── */
    .sb-nav {
      flex: 1; overflow-y: auto; overflow-x: hidden;
      padding: 6px 0 10px;
      position: relative; z-index: 1;
    }
    .sb-nav::-webkit-scrollbar { width: 0; }

    .nav-sect {
      padding: 16px 20px 5px;
      font-size: var(--fs-2xs); font-weight: 700;
      letter-spacing: 2.5px; text-transform: uppercase;
      color: var(--ink-4);
      display: flex; align-items: center; gap: 8px;
    }

    .nav-sect::after {
      content: '';
      flex: 1; height: 1px;
      background: var(--surface-2);
    }

    .nav-item {
      display: flex; align-items: center; gap: 11px;
      padding: 8px 14px 8px 16px;
      margin: 1px 7px;
      border-radius: var(--rs);
      cursor: pointer; border: none;
      background: transparent;
      width: calc(100% - 16px);
      text-align: left;
      color: var(--sb-ink-2);
      font-family: var(--ff-b);
      font-size: var(--fs-base); font-weight: 500;
      transition: all .18s;
      position: relative; overflow: hidden;
    }

    /* Hover sweep reveal */
    .nav-item::before {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(90deg, rgba(22,168,211,.1) 0%, rgba(22,168,211,.04) 50%, transparent 100%);
      transform: translateX(-100%);
      transition: transform .28s cubic-bezier(.22,1,.36,1);
      border-radius: var(--rs);
    }

    .nav-item:hover::before { transform: translateX(0); }

    .nav-item:hover {
      color: var(--ink);
    }

    .nav-item.active {
      background: rgba(22,168,211,.11);
      color: var(--blue);
      font-weight: 600;
      border: 1px solid rgba(22,168,211,.18);
      box-shadow: inset 0 0 20px rgba(22,168,211,.04);
    }

    .nav-item.active::before { display: none; }

    /* Glowing left accent bar for active */
    .nav-item.active::after {
      content: '';
      position: absolute;
      left: -8px; top: 20%; bottom: 20%;
      width: 3px;
      background: var(--blue);
      border-radius: 0 3px 3px 0;
      box-shadow: 0 0 8px var(--blue), 0 0 16px rgba(22,168,211,.4);
    }

    .nav-icon {
      width: 15px; height: 15px;
      flex-shrink: 0; color: var(--sb-ink-3);
      transition: color .18s; position: relative; z-index: 1;
    }
    .nav-item:hover .nav-icon { color: var(--blue-hi); }
    .nav-item.active .nav-icon { color: var(--blue); }
    .nav-label { flex: 1; position: relative; z-index: 1; }

    .nav-badge {
      background: var(--err); color: white;
      font-size: var(--fs-2xs); font-weight: 700;
      padding: 1px 6px; border-radius: 10px;
      font-family: var(--ff-m);
      position: relative; z-index: 1;
      box-shadow: 0 0 8px rgba(220,38,38,.4);
    }

    /* ── User footer ── */
    .sb-foot {
      flex-shrink: 0;
      padding: 10px 12px 14px;
      border-top: 1px solid var(--sb-line);
      position: relative; z-index: 1;
    }

    .user-chip {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 12px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--r); margin-bottom: 8px;
      transition: background .18s;
    }

    .user-chip:hover { background: var(--sb-hover); }

    .user-av {
      width: 34px; height: 34px;
      background: linear-gradient(135deg, var(--blue), var(--blue-dim));
      border-radius: 9px;
      display: flex; align-items: center; justify-content: center;
      font-size: var(--fs-xs); font-weight: 700; color: white;
      flex-shrink: 0; font-family: var(--ff-m);
      letter-spacing: .5px;
      box-shadow: 0 0 0 1px rgba(22,168,211,.3), 0 2px 8px rgba(22,168,211,.2);
    }

    .user-info { min-width: 0; flex: 1; }
    .user-name  { font-size: var(--fs-base); font-weight: 600; color: var(--ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .user-role-el { font-size: var(--fs-2xs); color: var(--ink-3); margin-top: 1px; letter-spacing: .3px; }

    .btn-logout {
      width: 100%; padding: 8px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: var(--rs);
      color: var(--ink-3);
      font-family: var(--ff-b); font-size: var(--fs-sm); font-weight: 500;
      cursor: pointer; transition: all .2s;
      display: flex; align-items: center; justify-content: center; gap: 7px;
    }
    .btn-logout:hover { border-color: rgba(220,38,38,.4); color: rgba(255,130,130,.8); background: rgba(220,38,38,.06); }

    /* ══════════════════════════════════════════════════════
       TOPBAR — Clean authority with brand accent
    ══════════════════════════════════════════════════════ */
    .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

    .topbar {
      height: var(--th);
      background: var(--surface);
      border-bottom: 1px solid var(--sb-line);
      display: flex; align-items: center;
      justify-content: space-between;
      padding: 0 16px; flex-shrink: 0; gap: 10px;
      position: relative; z-index: 1000;
      /* Subtle bottom shadow + top brand line */
      box-shadow: 0 1px 0 var(--border), var(--sh-xs);
    }

    /* Thin brand gradient line at very top of topbar */
    .topbar::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, transparent 0%, var(--navy) 15%, var(--blue) 50%, var(--blue-hi) 65%, transparent 100%);
      opacity: .7;
    }

    .tb-left { display: flex; align-items: center; gap: 10px; }

    .tb-eyebrow {
      font-family: var(--ff-b);
      font-size: var(--fs-xs); font-weight: 700;
      letter-spacing: 1.5px; text-transform: uppercase;
      color: var(--ink-3);
    }

    .tb-sep { color: var(--border-2); font-size: var(--fs-lg); font-weight: 300; }

    .tb-title {
      font-family: var(--ff-d);
      font-size: var(--fs-lg); font-weight: 700;
      color: var(--ink);
      letter-spacing: -.015em;
    }

    .tb-right { display: flex; align-items: center; gap: 10px; }

    /* Operational status pill */
    .ops-status-pill {
      display: flex; align-items: center; gap: 6px;
      padding: 5px 12px;
      background: var(--ok-bg);
      border: 1px solid rgba(10,138,106,.18);
      border-radius: 20px;
    }

    .ops-status-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--ok); flex-shrink: 0;
      animation: opsPulse 2.5s ease-in-out infinite;
    }

    @keyframes opsPulse {
      0%,100% { opacity: 1; }
      50%      { opacity: .45; }
    }

    .ops-status-label {
      font-size: var(--fs-2xs); font-weight: 700;
      letter-spacing: 1.2px; text-transform: uppercase;
      color: var(--ok);
    }

    /* demo-pill removed v3.2.1 */

    #current-time {
      font-family: var(--ff-m);
      font-size: var(--fs-xs); color: var(--ink-3); letter-spacing: .3px;
    }

    .tb-btn {
      width: 36px; height: 36px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--rs);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; color: var(--ink-3);
      transition: all .18s; position: relative;
    }

    .tb-btn:hover {
      border-color: var(--blue); color: var(--blue);
      background: rgba(22,168,211,.06);
      transform: translateY(-1px); box-shadow: var(--sh-sm);
    }

    .tb-btn .badge {
      position: absolute; top: -5px; right: -5px;
      background: var(--err); color: white;
      width: 16px; height: 16px; border-radius: 50%;
      font-size: var(--fs-2xs); font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      font-family: var(--ff-m); border: 1.5px solid var(--surface);
      box-shadow: 0 0 6px rgba(220,38,38,.4);
    }

    /* ══════════════════════════════════════════════════════
       CONTENT CANVAS
    ══════════════════════════════════════════════════════ */
    .content {
      flex: 1; overflow-y: auto; overflow-x: hidden;
      padding: 28px;
      /* Very subtle paper texture — barely visible */
      background:
        radial-gradient(ellipse 60% 40% at 80% 10%, rgba(22,168,211,.025) 0%, transparent 55%),
        radial-gradient(ellipse 50% 40% at 10% 90%, rgba(10,42,61,.025) 0%, transparent 55%),
        var(--canvas);
    }

    .content::-webkit-scrollbar { width: 5px; }
    .content::-webkit-scrollbar-track { background: transparent; }
    .content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    .content::-webkit-scrollbar-thumb:hover { background: var(--border-2); }

    .tab-content { display: none; }
    .tab-content.active { display: block; animation: tabIn .22s ease; }
    @keyframes tabIn { from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);} }

    @media (prefers-reduced-motion: reduce) {
      .tab-content.active { animation: none; }
      .sb-mark-wrap::before, .sb-status-dot,
      .ops-status-dot, @keyframes markGlow,
      .nav-item::before { animation: none; transition: none; }
    }

    /* ══════════════════════════════════════════════════════
       ALERT TRAY
    ══════════════════════════════════════════════════════ */
    .alert-panel {
      position: fixed; top: var(--th); right: -360px;
      width: 340px; bottom: 0;
      background: var(--surface); border-left: 1px solid var(--border);
      z-index: 200; transition: right .3s cubic-bezier(.4,0,.2,1);
      display: flex; flex-direction: column;
    }
    .alert-panel.open { right: 0; box-shadow: var(--sh-lg); }
    .alert-panel-header { padding: 18px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
    .alert-panel-title { font-family: var(--ff-d); font-size: var(--fs-lg); font-weight: 700; color: var(--ink); }
    .alert-panel-close { background: none; border: none; color: var(--ink-3); cursor: pointer; font-size: var(--fs-lg); padding: 4px 6px; border-radius: 4px; transition: all .2s; }
    .alert-panel-close:hover { color: var(--err); background: var(--eb); }
    .alert-panel-body { flex: 1; overflow-y: auto; padding: 14px; }

    /* ══════════════════════════════════════════════════════
       WELCOME STATE — Editorial, commanding
    ══════════════════════════════════════════════════════ */
    .welcome { display: flex; flex-direction: column; gap: 20px; }

    /* Greeting — full bleed editorial header */
    .greeting {
      border-radius: var(--rl);
      background: var(--navy-deep);
      position: relative; overflow: hidden;
      padding: 36px 40px;
      display: flex; align-items: center; justify-content: space-between;
      gap: 24px;
    }

    .greeting::before {
      content: '';
      position: absolute; inset: 0;
      background:
        radial-gradient(ellipse 100% 100% at 110% 110%, rgba(13,127,160,.55) 0%, transparent 50%),
        radial-gradient(ellipse 60% 50% at -10% -10%, rgba(22,168,211,.08) 0%, transparent 45%);
      pointer-events: none;
    }

    /* Fine grid overlay */
    .greeting::after {
      content: '';
      position: absolute; inset: 0;
      background-image:
        linear-gradient(rgba(22,168,211,.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(22,168,211,.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }

    .greeting-left { position: relative; z-index: 1; }

    .greeting-kicker {
      font-family: var(--ff-b);
      font-size: var(--fs-2xs); font-weight: 700;
      letter-spacing: 3px; text-transform: uppercase;
      color: var(--blue); margin-bottom: 10px;
      display: flex; align-items: center; gap: 8px;
    }

    .greeting-kicker::before {
      content: '';
      width: 20px; height: 1.5px;
      background: var(--blue);
      border-radius: 1px;
    }

    .greeting-name {
      font-family: var(--ff-d);
      font-size: var(--fs-hero);
      font-weight: 900; color: #ffffff;
      letter-spacing: -.03em; line-height: 1.05;
      margin-bottom: 10px;
    }

    .greeting-name span {
      color: var(--blue);
      font-style: italic;
    }

    .greeting-sub {
      font-size: var(--fs-base); color: var(--ink-2);
      line-height: 1.6; max-width: 380px;
    }

    /* Right side — live KPI strip */
    .greeting-kpis {
      position: relative; z-index: 1;
      display: flex; gap: 1px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      flex-shrink: 0;
    }

    .gkpi {
      padding: 18px 22px;
      display: flex; flex-direction: column; gap: 4px;
      min-width: 90px;
      position: relative;
    }

    .gkpi + .gkpi::before {
      content: '';
      position: absolute;
      left: 0; top: 20%; bottom: 20%;
      width: 1px;
      background: var(--surface-h);
    }

    .gkpi-val {
      font-family: var(--ff-d);
      font-size: var(--fs-2xl); font-weight: 900;
      color: #ffffff; line-height: 1;
      letter-spacing: -.02em;
    }

    .gkpi-val.blue  { color: var(--blue); }
    .gkpi-val.amber { color: var(--amber); }
    .gkpi-val.red   { color: var(--err); }
    .gkpi-val.green { color: var(--ok); }

    .gkpi-lbl {
      font-size: var(--fs-2xs); font-weight: 700;
      letter-spacing: 1.5px; text-transform: uppercase;
      color: var(--ink-3);
    }

    /* Decorative horizontal rule with brand mark */
    .section-divider {
      display: flex; align-items: center; gap: 16px;
      margin: 4px 0 0;
    }

    .section-divider::before,
    .section-divider::after {
      content: '';
      flex: 1; height: 1px;
      background: linear-gradient(90deg, transparent, var(--border), transparent);
    }

    .section-divider-label {
      font-size: var(--fs-2xs); font-weight: 700;
      letter-spacing: 2.5px; text-transform: uppercase;
      color: var(--ink-4);
      white-space: nowrap;
    }

    /* Quick action grid */
    .quick-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
    }

    .qtile {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 20px 18px 18px;
      cursor: pointer;
      transition: all .22s cubic-bezier(.22,1,.36,1);
      display: flex; flex-direction: column; gap: 14px;
      box-shadow: var(--sh-xs);
      position: relative; overflow: hidden;
    }

    /* Bottom gradient line — reveals on hover */
    .qtile::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 2px;
      opacity: 0;
      transition: opacity .22s;
    }

    .qtile:hover {
      transform: translateY(-4px);
      box-shadow: var(--sh-md);
      border-color: var(--border-2);
    }

    .qtile:hover::after { opacity: 1; }

    .qtile.qt-red::after    { background: linear-gradient(90deg, var(--err), #ff8080); }
    .qtile.qt-blue::after   { background: linear-gradient(90deg, var(--blue), var(--blue-hi)); }
    .qtile.qt-green::after  { background: linear-gradient(90deg, var(--ok), #34d399); }
    .qtile.qt-amber::after  { background: linear-gradient(90deg, var(--amber), #fcd34d); }

    .qtile-icon {
      width: 40px; height: 40px;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
    }

    .qtile-content { flex: 1; }
    .qtile-label { font-size: var(--fs-md); font-weight: 700; color: var(--ink); margin-bottom: 3px; }
    .qtile-sub   { font-size: var(--fs-xs); color: var(--ink-3); line-height: 1.45; }

    .qtile-arrow {
      width: 20px; height: 20px;
      border-radius: 50%;
      background: var(--canvas);
      display: flex; align-items: center; justify-content: center;
      color: var(--ink-4);
      transition: all .22s;
      align-self: flex-start;
    }

    .qtile:hover .qtile-arrow {
      background: var(--ink);
      color: white;
      transform: translateX(3px);
    }

    /* Lower grid */
    .lower-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 300px;
      gap: 16px;
    }

    /* Status card */
    .status-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r);
      box-shadow: var(--sh-xs);
      overflow: hidden;
    }

    .sc-head {
      padding: 16px 20px;
      border-bottom: 1px solid var(--sb-line);
      display: flex; align-items: center; justify-content: space-between;
    }

    .sc-title { font-family: var(--ff-d); font-size: var(--fs-md); font-weight: 700; color: var(--ink); }

    .sc-row {
      padding: 13px 20px;
      border-bottom: 1px solid var(--sb-line);
      display: flex; align-items: center; justify-content: space-between;
      transition: background .12s;
    }
    .sc-row:last-child { border-bottom: none; }
    .sc-row:hover { background: var(--surface-3); }

    .sc-row-left { display: flex; align-items: center; gap: 12px; }

    .sc-dot {
      width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
    }

    .sc-row-label { font-size: var(--fs-base); font-weight: 600; color: var(--ink); }
    .sc-row-sub   { font-size: var(--fs-xs); color: var(--ink-3); margin-top: 1px; }
    .sc-row-val   { font-family: var(--ff-m); font-size: var(--fs-sm); color: var(--ink-2); }

    /* Metric summary card */
    .metrics-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r);
      box-shadow: var(--sh-xs);
      overflow: hidden;
    }

    .mc-head {
      padding: 16px 20px;
      border-bottom: 1px solid var(--sb-line);
      display: flex; align-items: center; justify-content: space-between;
    }

    .mc-title { font-family: var(--ff-d); font-size: var(--fs-md); font-weight: 700; color: var(--ink); }

    .mc-row {
      padding: 13px 20px;
      border-bottom: 1px solid var(--sb-line);
      display: flex; align-items: center; justify-content: space-between;
      transition: background .12s;
    }
    .mc-row:last-child { border-bottom: none; }
    .mc-row:hover { background: var(--surface-3); }

    .mc-label { font-size: var(--fs-base); color: var(--ink-2); font-weight: 500; }

    .mc-val {
      font-family: var(--ff-d);
      font-size: var(--fs-xl); font-weight: 800;
      color: var(--ink); letter-spacing: -.01em;
    }
    .mc-val.blue  { color: var(--blue); }
    .mc-val.amber { color: var(--amber); }
    .mc-val.red   { color: var(--err); }
    .mc-val.green { color: var(--ok); }

    /* Recent activity feed */
    .activity-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r);
      box-shadow: var(--sh-xs);
      overflow: hidden;
    }

    .ac-head {
      padding: 16px 18px;
      border-bottom: 1px solid var(--sb-line);
      display: flex; align-items: center; justify-content: space-between;
    }

    .ac-title { font-family: var(--ff-d); font-size: var(--fs-md); font-weight: 700; color: var(--ink); }

    .ac-item {
      padding: 11px 18px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: flex-start; gap: 10px;
      transition: background .12s;
    }
    .ac-item:last-child { border-bottom: none; }
    .ac-item:hover { background: var(--surface-3); }

    .ac-dot {
      width: 7px; height: 7px; border-radius: 50%;
      flex-shrink: 0; margin-top: 5px;
    }

    .ac-text { flex: 1; }
    .ac-label { font-size: var(--fs-base); color: var(--ink); font-weight: 500; line-height: 1.4; }
    .ac-time  { font-size: var(--fs-xs); color: var(--ink-4); margin-top: 2px; font-family: var(--ff-m); }

    /* ══════════════════════════════════════════════════════
       COMPONENT LIBRARY (consumed by all JS modules)
    ══════════════════════════════════════════════════════ */
    .modern-card,.ops-card { background:var(--surface); border-radius:var(--r); border:1px solid var(--border); box-shadow:var(--sh-xs); }
    .ops-card-header { padding:14px 20px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
    .ops-card-title { font-family:var(--ff-d); font-size:var(--fs-md); font-weight:700; color:var(--ink); }
    .ops-card-body { padding:18px 20px; }

    .status-badge { display:inline-flex; align-items:center; gap:5px; padding:3px 10px; border-radius:20px; font-size:var(--fs-xs); font-weight:700; letter-spacing:.3px; }
    .status-badge.nominal  { background:var(--ok-bg); color:var(--ok); }
    .status-badge.watch    { background:var(--wb);    color:var(--warn); }
    .status-badge.warning  { background:var(--cb);    color:var(--caut); }
    .status-badge.critical { background:var(--eb);    color:var(--err); }
    .status-badge.offline  { background:var(--ob);    color:var(--off); }

    /* ══ Shared page header — every module's opening H1 + subtitle ══
       Properties and Clients each had their own identical copy of this
       (.pr-header/.cl-header, byte-for-byte the same rules under different
       prefixes); Sentinel and Alerts had no header at all and started cold
       on their KPI strip. One class pair, used by all four. */
    .fg-page-header { display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:20px; }
    .fg-page-title { font-family:var(--ff-d); font-size:var(--fs-xl); font-weight:800; color:var(--ink); letter-spacing:-.02em; margin-bottom:3px; }
    .fg-page-sub { font-size:var(--fs-base); color:var(--ink-3); }

    /* ══ Shared KPI strip — the ONE stat-card design every module uses ══
       Built via OpsModal.kpiStrip()/kpiCard() (js/ops-modal.js). This
       replaces five different bespoke KPI card implementations that used
       to make Dashboard, Sentinel, Properties, Clients, and Alerts each
       look like a different product (icon+sentence-case vs uppercase+
       colored-border vs uppercase+colored-numerals, 5/5/4/4/5 card counts,
       three different value type sizes). One card, one grid rhythm,
       consumed everywhere. */
    .fg-kpis { display:grid; grid-template-columns:repeat(auto-fit,minmax(190px,1fr)); gap:10px; margin-bottom:14px; }
    .fg-kpi { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:12px 14px; display:flex; gap:10px; align-items:flex-start; box-shadow:var(--sh-xs); transition:border-color .15s; min-width:0; }
    .fg-kpi:hover { border-color:var(--border-2); }
    .fg-kpi.clickable { cursor:pointer; }
    .fg-kpi.active { border-color:var(--blue-dim); box-shadow:0 0 0 2px var(--neon-glow), var(--sh-xs); }
    .fg-kpi-ic { width:32px; height:32px; border-radius:9px; display:grid; place-items:center; flex-shrink:0; }
    .fg-kpi-ic svg { width:16px; height:16px; }
    .fg-kpi-body { min-width:0; flex:1; }
    .fg-kpi-label { font-size:var(--fs-2xs); font-weight:500; color:var(--ink-2); line-height:1.25; }
    .fg-kpi-val { font-family:var(--ff-b); font-size:var(--fs-2xl); font-weight:700; color:var(--ink); margin-top:4px; line-height:1.15; letter-spacing:-.5px; }
    /* sub-line WRAPS instead of silently ellipsis-truncating — a narrow
       card used to cut "Deployed Sentinels" down to "Deployed Senti" with
       no way to recover the rest of the sentence. */
    .fg-kpi-sub { font-size:var(--fs-xs); color:var(--ink-3); margin-top:4px; display:flex; align-items:flex-start; gap:4px; line-height:1.35; }
    .fg-kpi-sub.ok { color:var(--ok); } .fg-kpi-sub.err { color:var(--err); } .fg-kpi-sub.warn { color:var(--warn); }
    .fg-kpi-sub .d { width:6px; height:6px; border-radius:50%; background:currentColor; flex-shrink:0; margin-top:5px; }

  async function loadWelcomeKPIs() {
    try {
      if (typeof OpsModal === 'undefined') return;
      const res  = await OpsModal.apiGet('/analytics/kpis');
      const k    = res.data || {};
      const set  = (id, val) => { const el = document.getElementById(id); if (el) el.textContent = val; };

      set('g-sites',   k.activeSites   ?? '—');
      set('g-alerts',  k.activeAlerts  ?? '—');
      set('g-sensors', k.sensorsOnline?.online != null ? `${k.sensorsOnline.online}/${k.sensorsOnline.total}` : '—');
      set('g-sla',     k.networkUptime != null ? k.networkUptime + '%' : '—');

      set('m-sites',   k.activeSites   ?? '—');
      set('m-sensors', k.sensorsOnline?.online != null ? `${k.sensorsOnline.online}/${k.sensorsOnline.total}` : '—');
      set('m-alerts',  k.activeAlerts  ?? '—');
      set('m-sla',     k.networkUptime != null ? k.networkUptime + '%' : '—');
      set('m-mrr',     k.mrr != null ? '₦' + Number(k.mrr).toLocaleString() : '—');

      const acLoad = document.getElementById('ac-kpi-load');
      const acTime = document.getElementById('ac-kpi-time');
      if (acLoad) acLoad.style.display = 'flex';
      if (acTime) acTime.textContent = new Date().toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' });

    } catch { /* silent */ }
  }

  /* ── Nav & tab logic ── */
  function applyRoleNav() {
    ALL_TABS.forEach(tab => {
      const btn = document.getElementById(`nav-${tab}`);
      if (btn) btn.style.display = Auth.hasNavAccess(tab) ? '' : 'none';
    });
    // hide a top-nav group when all of its links are inaccessible
    document.querySelectorAll('.tnav-grp').forEach(grp => {
      const links = [...grp.querySelectorAll('.tnav-link')];
      grp.style.display = links.some(l => l.style.display !== 'none') ? '' : 'none';
    });
  }

  // ── Tab switching with URL hash persistence ──────────────────────────
  // Hash format: #alerts, #clients, etc.
  // On refresh the browser keeps the hash → we restore the correct tab.

  let _activeTab    = null;
  let _switching    = false; // debounce — prevents duplicate renders on rapid clicks
  const _syncTimes  = {};    // tracks when each tab last fetched data

  function switchTab(name) {
    if (!Auth.hasNavAccess(name)) return;
    if (_switching) return; // ignore rapid clicks
    _switching = true;
    setTimeout(() => { _switching = false; }, 300);

    ALL_TABS.forEach(t => {
      document.getElementById(`content-${t}`)?.classList.remove('active');
      document.getElementById(`nav-${t}`)?.classList.remove('active');
    });

    document.getElementById(`content-${name}`)?.classList.add('active');
    document.getElementById(`nav-${name}`)?.classList.add('active');
    document.querySelectorAll('.tnav-grp.active').forEach(g => g.classList.remove('active'));
    document.getElementById(`nav-${name}`)?.closest('.tnav-grp')?.classList.add('active');

    const m = TAB_META[name] || {};
    const setTxt = (id, v) => { const el = document.getElementById(id); if (el) el.textContent = v; };
    setTxt('topbar-module', m.module || name);
    setTxt('topbar-title', m.title || name);
    document.title = `${m.title || name} · FlowGuard Ops`;

    _activeTab = name;
    updateSyncBadge(name);

    // Persist tab in URL hash — survives refresh without server roundtrip
    if (window.location.hash !== '#' + name) {
      history.replaceState(null, '', '#' + name);
    }

    renderTab(name);
  }

  function stampSync(name) {
    _syncTimes[name] = Date.now();
    updateSyncBadge(name);
  }

  function updateSyncBadge(name) {
    const el  = document.getElementById('topbar-sync');
    const ts  = _syncTimes[name];
    if (!el) return;
    if (!ts) { el.textContent = ''; el.style.display = 'none'; return; }
    const diff = Math.floor((Date.now() - ts) / 60000);
    el.style.display  = 'inline';
    el.textContent    = diff < 1 ? 'Just now' : diff === 1 ? '1 min ago' : `${diff} min ago`;
  }

  // ── Tab rendering with error boundary ────────────────────────────────

  function renderTab(name) {
    const c = document.getElementById(`content-${name}`);
    if (!c || c.hasAttribute('data-rendered')) return;

    const MODS = {
      dashboard:        () => typeof OpsDashboard      !== 'undefined' ? OpsDashboard      : null,
      clients:          () => typeof OpsClients        !== 'undefined' ? OpsClients        : null,
      properties:       () => typeof OpsProperties     !== 'undefined' ? OpsProperties     : null,
      assets:           () => typeof OpsAssets         !== 'undefined' ? OpsAssets         : null,
      network:          () => typeof OpsNetwork        !== 'undefined' ? OpsNetwork        : null,
      sensors:          () => typeof OpsSensors        !== 'undefined' ? OpsSensors        : null,
      alerts:           () => typeof OpsAlerts         !== 'undefined' ? OpsAlerts         : null,
      teams:            () => typeof OpsTeams          !== 'undefined' ? OpsTeams          : null,
      'team-members':   () => typeof OpsUserManagement !== 'undefined' ? OpsUserManagement : null,
      'field-reports':  () => typeof OpsFieldReports   !== 'undefined' ? OpsFieldReports   : null,
      maintenance:      () => typeof OpsMaintenance     !== 'undefined' ? OpsMaintenance    : null,
      forecast:         () => typeof OpsForecast        !== 'undefined' ? OpsForecast       : null,
      reports:          () => typeof OpsReports        !== 'undefined' ? OpsReports        : null,
      billing:          () => typeof OpsBilling        !== 'undefined' ? OpsBilling        : null,
      sla:              () => typeof OpsSLA            !== 'undefined' ? OpsSLA            : null,
      audit:            () => typeof OpsAudit          !== 'undefined' ? OpsAudit          : null,
      settings:         () => typeof OpsSettings       !== 'undefined' ? OpsSettings       : null,
    };

    const mod = MODS[name]?.();

    try {
      if (mod) {
        mod.render(c);
      } else if (name === 'dashboard') {
        renderWelcome(c);
      } else {
        renderTabError(c, name, 'Module not loaded');
        return; // don't mark as rendered so retry works
      }
      c.setAttribute('data-rendered', 'true');
      stampSync(name);
    } catch (err) {
      console.error(`[FlowGuard] Tab "${name}" render error:`, err);
      renderTabError(c, name, err.message);
    }
  }

  function renderTabError(container, name, message) {
    container.innerHTML = `
      <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;
        height:300px;color:var(--ink-3);">
        <svg width="40" height="40" fill="none" stroke="currentColor" stroke-width="1.3"
          viewBox="0 0 24 24" style="margin-bottom:14px;opacity:.3;">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M12 9v2m0 4h.01M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/>
        </svg>
        <div style="font-size:var(--fs-md);font-weight:600;color:var(--ink-2);margin-bottom:6px;">
          Failed to load ${name}
        </div>
        <div style="font-size:var(--fs-sm);margin-bottom:18px;">${message || 'Unknown error'}</div>
        <button class="btn-ghost" onclick="reloadTab('${name}')">Retry</button>
      </div>`;
  }

  function reloadTab(name) {
    const c = document.getElementById(`content-${name}`);
    if (c) { c.removeAttribute('data-rendered'); c.innerHTML = ''; }
    delete _syncTimes[name];
    renderTab(name);
  }

  // ── Alert tray ────────────────────────────────────────────────────────
  function toggleAlertPanel() {
    document.getElementById('alertPanel').classList.toggle('open');
  }

  function updateAlertCount(n) {
    const b = document.getElementById('nav-badge-alerts');
    const t = document.getElementById('topbar-alert-badge');
    if (n > 0) {
      if (b) { b.textContent = n; b.style.display = 'inline-flex'; }
      if (t) { t.textContent = n; t.style.display = 'flex'; }
    } else {
      if (b) b.style.display = 'none';
      if (t) t.style.display = 'none';
    }
  }

  // ── Alert polling — 60s interval ─────────────────────────────────────
  // Keeps alert count in topbar fresh without a full page reload.
  // Silently polls /alerts and updates the badge. Does NOT re-render the
  // alerts tab unless the user is currently viewing it.

  async function pollAlerts() {
    try {
      const token = Auth.getToken();
      if (!token) return;
      const res    = await fetch(`${CONFIG.API_BASE}/alerts`, {
        headers: { 'Authorization': 'Bearer ' + token }
      });
      if (!res.ok) return;
      const data   = await res.json();
      const alerts = data.data || data.alerts || [];
      updateAlertCount(Array.isArray(alerts) ? alerts.length : 0);

      // If alerts tab is currently active and rendered, silently refresh it
      const alertTab = document.getElementById('content-alerts');
      if (alertTab?.classList.contains('active') && typeof OpsAlerts !== 'undefined') {
        alertTab.removeAttribute('data-rendered');
        alertTab.innerHTML = '';
        OpsAlerts.render(alertTab);
        alertTab.setAttribute('data-rendered', 'true');
      }
    } catch {
      // Silent — network issue, don't surface to user
    }

    // Poll field reports awaiting review — update sidebar badge
    try {
      const token = Auth.getToken();
      if (!token) return;
      const res = await fetch(`${CONFIG.API_BASE}/field-reports?status=submitted&limit=100`, {
        headers: { 'Authorization': 'Bearer ' + token }
      });
      if (!res.ok) return;
      const data = await res.json();
      const pending = (data.data || []).length;
      const badge = document.getElementById('nav-badge-field-reports');
      if (badge) {
        if (pending > 0) { badge.textContent = pending; badge.style.display = 'inline-flex'; }
        else             { badge.style.display = 'none'; }
      }
    } catch { /* silent */ }
  }

  // ── Clock ─────────────────────────────────────────────────────────────
  function updateClock() {
    const now = new Date();
    const t = now.toLocaleTimeString([], { hour:'2-digit', minute:'2-digit', second:'2-digit' });
    document.getElementById('current-time').textContent = t;
  }

  // ── One-time topbar setup ────────────────────────────────────────────
  // This used to live INSIDE updateClock(), which runs every second via
  // setInterval — so the storm-banner fetch, the weather-chip fetch, and
  // the command-search event listeners were all re-registered every
  // second, forever: duplicate listeners piling up on every keystroke
  // handler, and a fresh setInterval(load, 30min) created every second
  // that never gets cleared, hammering the weather API in ever-growing
  // multiples the longer a tab stays open. None of that is time-related —
  // it only needs to run once at boot.
  function initTopbarWidgets() {
    // ══ Theme (dark-first COMMAND) ══
    window.OpsTheme = (function () {
      function get() { return localStorage.getItem('ops_theme') || 'dark'; }
      function apply(t) {
        document.documentElement.dataset.theme = t;
        const sun = document.getElementById('theme-icon-sun');
        const moon = document.getElementById('theme-icon-moon');
        if (sun && moon) { sun.style.display = t === 'dark' ? '' : 'none'; moon.style.display = t === 'dark' ? 'none' : ''; }
      }
      function set(t) {
        localStorage.setItem('ops_theme', t);
        apply(t);
        window.dispatchEvent(new CustomEvent('ops-theme-change', { detail: t }));
      }
      function toggle() { set(get() === 'dark' ? 'light' : 'dark'); }
      apply(get());
      return { get, set, toggle };
    })();


    // ══ Storm warning banner (next 48h heavy rainfall) ══
    (async function stormWatch() {
      try {
        const r = await fetch('https://api.open-meteo.com/v1/forecast?latitude=6.45&longitude=3.47&daily=precipitation_sum&timezone=Africa%2FLagos&forecast_days=2');
        const j = await r.json();
        const days = j.daily.time.map((t, i) => ({ t, mm: j.daily.precipitation_sum[i] || 0 }));
        const worst = days.reduce((a, b) => b.mm > a.mm ? b : a, days[0]);
        if (worst.mm >= 20) {
          const el = document.getElementById('tb-storm');
          const day = new Date(worst.t).toDateString() === new Date().toDateString() ? 'today' : 'tomorrow';
          document.getElementById('tb-storm-s').textContent = `Heavy rainfall ${day} · ~${Math.round(worst.mm)}mm across Lagos`;
          el.style.display = 'flex';
        }
      } catch (_) {}
    })();

    // ══ Command search (clients + properties) ══
    (function cmdSearch() {
      const input = document.getElementById('tb-search');
      const drop = document.getElementById('tb-search-drop');
      if (!input || !drop) return;
      let idx = null, t = null;
      async function buildIndex() {
        if (idx) return idx;
        const [c, p] = await Promise.all([
          OpsModal.apiGet('/clients').catch(() => ({ data: [] })),
          OpsModal.apiGet('/properties').catch(() => ({ data: [] })),
        ]);
        idx = [
          ...(c.data || []).map(x => ({ kind: 'Client', tab: 'clients', name: x.company_name || x.name || x.estate_manager_name || '', sub: x.estate_manager_email || '' })),
          ...(p.data || []).map(x => ({ kind: 'Property', tab: 'properties', name: x.property_name || x.property_id || '', sub: [x.city, x.state].filter(Boolean).join(', ') })),
        ].filter(x => x.name);
        return idx;
      }
      input.addEventListener('input', () => {
        clearTimeout(t);
        const q = input.value.trim().toLowerCase();
        if (q.length < 2) { drop.style.display = 'none'; return; }
        t = setTimeout(async () => {
          const list = await buildIndex();
          const hits = list.filter(x => x.name.toLowerCase().includes(q) || (x.sub || '').toLowerCase().includes(q)).slice(0, 8);
          drop.innerHTML = hits.length
            ? hits.map(h => `<div class="tbs-item" onclick="switchTab('${h.tab}');document.getElementById('tb-search-drop').style.display='none';document.getElementById('tb-search').value='';"><span class="tbs-kind">${h.kind}</span>${h.name}<span class="tbs-sub">${h.sub}</span></div>`).join('')
            : '<div class="tbs-item" style="cursor:default;color:var(--ink-3)">No matches</div>';
          drop.style.display = 'block';
        }, 220);
      });
      document.addEventListener('click', e => { if (!e.target.closest('#tb-search-wrap')) drop.style.display = 'none'; });
      document.addEventListener('keydown', e => {
        if ((e.metaKey || e.ctrlKey) && e.key === 'k') { e.preventDefault(); input.focus(); }
        if (e.key === 'Escape') drop.style.display = 'none';
      });
    })();

    // ══ Live weather chip (Open-Meteo, Lagos) ══
    (async function weatherChip() {

      async function load() {
        try {
          const r = await fetch('https://api.open-meteo.com/v1/forecast?latitude=6.45&longitude=3.47&current=temperature_2m,precipitation,weather_code&timezone=Africa%2FLagos');
          const j = await r.json();
          const c = j.current || {};
          const code = c.weather_code || 0;
          const desc = code >= 95 ? 'Storm' : code >= 80 ? 'Showers' : code >= 61 ? 'Rain' : code >= 51 ? 'Drizzle' : code >= 45 ? 'Fog' : code >= 2 ? 'Cloudy' : 'Clear';
          const tEl = document.getElementById('tb-temp'), cEl = document.getElementById('tb-cond'), rEl = document.getElementById('tb-rain');
          if (tEl) tEl.textContent = `${Math.round(c.temperature_2m)}°C`;
          if (cEl) cEl.textContent = desc;
          if (rEl) rEl.textContent = `${(c.precipitation ?? 0).toFixed(1)} mm`;
        } catch (_) {}
      }
      load();
      setInterval(load, 30 * 60 * 1000);
    })();
  }

  // ── Logout ────────────────────────────────────────────────────────────
  function toggleUserMenu(e) {
    e.stopPropagation();
    document.getElementById('tb-user-menu').classList.toggle('open');
  }
  function closeUserMenu() { document.getElementById('tb-user-menu').classList.remove('open'); }
  document.addEventListener('click', e => { if (!e.target.closest('#tb-user')) closeUserMenu(); });

  function handleLogout() {
    OpsModal.confirm('Sign out of FlowGuard Operations Center?', () => Auth.logout());
  }

  // ── Boot ─────────────────────────────────────────────────────────────
  document.addEventListener('DOMContentLoaded', () => {
    Auth.updateUserInfo();
    applyRoleNav();
    initTopbarWidgets();
    updateClock();
    setInterval(updateClock, 1000);
    setInterval(() => { if (_activeTab) updateSyncBadge(_activeTab); }, 60000);
    setInterval(pollAlerts, 60000); // alert polling every 60s

    // ── Tab restore from URL hash ──────────────────────────────────────
    // If the URL has a hash (#alerts, #clients, etc.) restore that tab.
    // Falls back to the user's role-default tab if hash is invalid or inaccessible.
    const hashTab = window.location.hash.replace('#', '');
    const startTab = (hashTab && ALL_TABS.includes(hashTab) && Auth.hasNavAccess(hashTab))
      ? hashTab
      : Auth.getDefaultTab();

    switchTab(startTab);

    // Handle browser back/forward navigation updating the tab
    window.addEventListener('popstate', () => {
      const h = window.location.hash.replace('#', '');
      if (h && ALL_TABS.includes(h) && Auth.hasNavAccess(h)) {
        switchTab(h);
      }
    });
  });

  // ── Cross-module deep-link ────────────────────────────────────────────
  // fgOpen(tab, id): switch to a module and open a specific record's detail.
  // Powers the bold relationship links (OpsModal.link) across detail screens.
  const FG_OPEN = {
    clients:         ['OpsClients',        'open'],
    properties:      ['OpsProperties',     'open'],
    assets:          ['OpsAssets',         'open'],
    sensors:         ['OpsSensors',        'viewSensor'],
    alerts:          ['OpsAlerts',         'open'],
    billing:         ['OpsBilling',        'open'],
    'team-members':  ['OpsUserManagement', 'open'],
    teams:           ['OpsTeams',          'viewTeam'],
    maintenance:     ['OpsMaintenance',    'openJob'],
    'field-reports': ['OpsFieldReports',   'openReport'],
  };
  function fgOpen(tab, id) {
    if (!tab || id == null || id === '') return;
    if (typeof Auth !== 'undefined' && Auth.hasNavAccess && !Auth.hasNavAccess(tab)) {
      try { OpsModal.toast('You do not have access to that module', 'warning'); } catch (e) {}
      return;
    }
    switchTab(tab);
    const spec = FG_OPEN[tab];
    if (!spec) return;
    const [g, m] = spec;
    const content = document.getElementById('content-' + tab);
    // A detail/drawer is on screen once one of these markers exists. Some
    // modules render detail from an in-memory list that loads asynchronously,
    // so we re-invoke open() until the record's detail actually appears.
    const shown = () => !!(content && content.querySelector(
      '[class*="detail-top"], [class*="detail-screen"], .sn-drawer, .report-detail, .tmv-back'));
    let tries = 15;
    // Always invoke open() on the first tick (so same-module links re-navigate
    // even when a detail is already on screen); after that, only keep retrying
    // while no detail has rendered yet — this covers modules whose detail reads
    // from an in-memory list that is still loading.
    (function attempt(first) {
      if (!first && shown()) return;
      const mod = window[g];
      if (mod && typeof mod[m] === 'function') {
        try { mod[m](id); } catch (e) { console.error('[FlowGuard] fgOpen', tab, id, e); }
      }
      if (tries-- > 0) setTimeout(() => attempt(false), 180);
    })(true);
  }

  window.switchTab        = switchTab;
  window.fgOpen           = fgOpen;
  window.reloadTab        = reloadTab;
  window.updateAlertCount = updateAlertCount;
  window.stampSync        = stampSync;
</script>
</body>
