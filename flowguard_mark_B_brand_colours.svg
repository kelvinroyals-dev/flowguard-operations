<svg width="100%" viewBox="0 0 680 380" xmlns="http://www.w3.org/2000/svg">

  <!--
    FlowGuard brand palette extracted from logo SVG + website:
    Primary cyan-blue : #16a8d3  (main brand blue)
    Deep navy         : #0a2a3d  (dark anchor)
    Mid blue          : #1cb8e8  (bright highlight)
    Amber-gold accent : #f5a623  (warm contrast from original mark)
    Water teal        : #0d7fa0  (water body mid-tone)
    Pale sky          : #cceeff  (light fill / foam)
  -->

  <defs>
    <clipPath id="mb-clip">
      <circle cx="340" cy="182" r="108"/>
    </clipPath>
  </defs>

  <!-- ── OUTER SIGNAL RINGS (IoT pulse) ── -->
  <circle cx="340" cy="182" r="148" fill="none" stroke="#16a8d3" stroke-width="1" opacity="0.15" style="fill:none;stroke:rgb(22, 168, 211);color:rgb(255, 255, 255);stroke-width:1.176471px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.15;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <circle cx="340" cy="182" r="132" fill="none" stroke="#16a8d3" stroke-width="1.2" opacity="0.25" style="fill:none;stroke:rgb(22, 168, 211);color:rgb(255, 255, 255);stroke-width:1.411765px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.25;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <circle cx="340" cy="182" r="118" fill="none" stroke="#1cb8e8" stroke-width="1.5" opacity="0.35" style="fill:none;stroke:rgb(28, 184, 232);color:rgb(255, 255, 255);stroke-width:1.764706px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.35;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- ── MAIN CIRCLE: deep navy base ── -->
  <circle cx="340" cy="182" r="108" fill="#0a2a3d" style="fill:rgb(10, 42, 61);stroke:none;color:rgb(255, 255, 255);stroke-width:1.176471px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- ── WATER FILL clipped to circle ── -->
  <g clip-path="url(#mb-clip)" style="fill:rgb(0, 0, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:1.176471px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">

    <!-- water body -->
    <rect x="232" y="214" width="216" height="90" fill="#0d7fa0" style="fill:rgb(13, 127, 160);stroke:none;color:rgb(255, 255, 255);stroke-width:1.176471px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

    <!-- primary wave crest -->
    <path d="M232 214&#10;             Q254 200 276 214&#10;             Q298 228 320 214&#10;             Q342 200 364 214&#10;             Q386 228 408 214&#10;             Q430 200 448 210&#10;             L448 216&#10;             Q430 202 408 216&#10;             Q386 230 364 216&#10;             Q342 202 320 216&#10;             Q298 230 276 216&#10;             Q254 202 232 216 Z" fill="#16a8d3" style="fill:rgb(22, 168, 211);stroke:none;color:rgb(255, 255, 255);stroke-width:1.176471px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

    <!-- secondary wave (deeper in) -->
    <path d="M232 234 Q254 226 276 234 Q298 242 320 234 Q342 226 364 234 Q386 242 408 234 Q430 226 448 231" fill="none" stroke="#1cb8e8" stroke-width="1.5" opacity="0.5" style="fill:none;stroke:rgb(28, 184, 232);color:rgb(255, 255, 255);stroke-width:1.764706px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.5;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

    <!-- foam flecks -->
    <ellipse cx="284" cy="250" rx="12" ry="3" fill="#cceeff" opacity="0.35" style="fill:rgb(204, 238, 255);stroke:none;color:rgb(255, 255, 255);stroke-width:1.176471px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.35;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    <ellipse cx="362" cy="264" rx="8" ry="2" fill="#cceeff" opacity="0.3" style="fill:rgb(204, 238, 255);stroke:none;color:rgb(255, 255, 255);stroke-width:1.176471px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.3;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    <ellipse cx="316" cy="278" rx="6" ry="2" fill="#cceeff" opacity="0.25" style="fill:rgb(204, 238, 255);stroke:none;color:rgb(255, 255, 255);stroke-width:1.176471px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.25;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  </g>

  <!-- ── CIRCLE BORDER ── -->
  <circle cx="340" cy="182" r="108" fill="none" stroke="#1cb8e8" stroke-width="2.5" opacity="0.4" style="fill:none;stroke:rgb(28, 184, 232);color:rgb(255, 255, 255);stroke-width:2.941176px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.4;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- ── CENTRAL DROPLET ── -->
  <!-- Drop body: cyan-blue teardrop -->
  <path d="M340 110&#10;           C358 132 374 148 374 166&#10;           C374 186 358 202 340 202&#10;           C322 202 306 186 306 166&#10;           C306 148 322 132 340 110 Z" fill="#16a8d3" style="fill:rgb(22, 168, 211);stroke:none;color:rgb(255, 255, 255);stroke-width:1.176471px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Drop inner navy fill (depth) -->
  <path d="M340 120&#10;           C355 139 367 153 367 166&#10;           C367 183 355 196 340 196&#10;           C325 196 313 183 313 166&#10;           C313 153 325 139 340 120 Z" fill="#0a2a3d" style="fill:rgb(10, 42, 61);stroke:none;color:rgb(255, 255, 255);stroke-width:1.176471px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Drop water shimmer (teal) -->
  <path d="M340 128&#10;           C352 144 361 156 361 166&#10;           C361 180 352 191 340 191&#10;           C328 191 319 180 319 166&#10;           C319 156 328 144 340 128 Z" fill="#0d7fa0" style="fill:rgb(13, 127, 160);stroke:none;color:rgb(255, 255, 255);stroke-width:1.176471px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Drop highlight glint -->
  <ellipse cx="331" cy="146" rx="5" ry="8" fill="#cceeff" opacity="0.55" transform="rotate(-18 331 146)" style="fill:rgb(204, 238, 255);stroke:none;color:rgb(255, 255, 255);stroke-width:1.176471px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.55;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- ── AMBER ACCENT DOT (signal / IoT active node) ── -->
  <circle cx="340" cy="110" r="6" fill="#f5a623" style="fill:rgb(245, 166, 35);stroke:none;color:rgb(255, 255, 255);stroke-width:1.176471px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <circle cx="340" cy="110" r="10" fill="none" stroke="#f5a623" stroke-width="1.5" opacity="0.5" style="fill:none;stroke:rgb(245, 166, 35);color:rgb(255, 255, 255);stroke-width:1.764706px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.5;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <circle cx="340" cy="110" r="15" fill="none" stroke="#f5a623" stroke-width="1" opacity="0.25" style="fill:none;stroke:rgb(245, 166, 35);color:rgb(255, 255, 255);stroke-width:1.176471px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.25;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- ── SIGNAL ARCS above drop (wifi / sensor pulse) ── -->
  <path d="M318 105 Q340 93 362 105" fill="none" stroke="#1cb8e8" stroke-width="2" stroke-linecap="round" opacity="0.75" style="fill:none;stroke:rgb(28, 184, 232);color:rgb(255, 255, 255);stroke-width:2.352941px;stroke-linecap:round;stroke-linejoin:miter;opacity:0.75;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <path d="M307 93 Q340 77 373 93" fill="none" stroke="#1cb8e8" stroke-width="1.5" stroke-linecap="round" opacity="0.4" style="fill:none;stroke:rgb(28, 184, 232);color:rgb(255, 255, 255);stroke-width:1.764706px;stroke-linecap:round;stroke-linejoin:miter;opacity:0.4;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- ── AMBER TICK MARKS on ring (compass / sensor calibration feel) ── -->
  <line x1="340" y1="72" x2="340" y2="62" stroke="#f5a623" stroke-width="2.5" stroke-linecap="round" style="fill:rgb(0, 0, 0);stroke:rgb(245, 166, 35);color:rgb(255, 255, 255);stroke-width:2.941176px;stroke-linecap:round;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <line x1="448" y1="182" x2="458" y2="182" stroke="#f5a623" stroke-width="2.5" stroke-linecap="round" style="fill:rgb(0, 0, 0);stroke:rgb(245, 166, 35);color:rgb(255, 255, 255);stroke-width:2.941176px;stroke-linecap:round;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <line x1="232" y1="182" x2="222" y2="182" stroke="#f5a623" stroke-width="2.5" stroke-linecap="round" style="fill:rgb(0, 0, 0);stroke:rgb(245, 166, 35);color:rgb(255, 255, 255);stroke-width:2.941176px;stroke-linecap:round;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <line x1="340" y1="292" x2="340" y2="302" stroke="#f5a623" stroke-width="2.5" stroke-linecap="round" style="fill:rgb(0, 0, 0);stroke:rgb(245, 166, 35);color:rgb(255, 255, 255);stroke-width:2.941176px;stroke-linecap:round;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- diagonal ticks at 45° -->
  <line x1="416" y1="106" x2="423" y2="99" stroke="#f5a623" stroke-width="1.5" stroke-linecap="round" opacity="0.5" style="fill:rgb(0, 0, 0);stroke:rgb(245, 166, 35);color:rgb(255, 255, 255);stroke-width:1.764706px;stroke-linecap:round;stroke-linejoin:miter;opacity:0.5;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <line x1="264" y1="106" x2="257" y2="99" stroke="#f5a623" stroke-width="1.5" stroke-linecap="round" opacity="0.5" style="fill:rgb(0, 0, 0);stroke:rgb(245, 166, 35);color:rgb(255, 255, 255);stroke-width:1.764706px;stroke-linecap:round;stroke-linejoin:miter;opacity:0.5;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <line x1="416" y1="258" x2="423" y2="265" stroke="#f5a623" stroke-width="1.5" stroke-linecap="round" opacity="0.5" style="fill:rgb(0, 0, 0);stroke:rgb(245, 166, 35);color:rgb(255, 255, 255);stroke-width:1.764706px;stroke-linecap:round;stroke-linejoin:miter;opacity:0.5;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <line x1="264" y1="258" x2="257" y2="265" stroke="#f5a623" stroke-width="1.5" stroke-linecap="round" opacity="0.5" style="fill:rgb(0, 0, 0);stroke:rgb(245, 166, 35);color:rgb(255, 255, 255);stroke-width:1.764706px;stroke-linecap:round;stroke-linejoin:miter;opacity:0.5;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

</svg>