<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FlowGuard — Sign In</title>
  <link rel="icon" href="favicon.ico" sizes="any">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="favicon-180.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;450;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#060f16; --bg-2:#0a1a24; --panel:#0e2029; --panel-2:#122733;
      --line:rgba(255,255,255,.08); --line-2:rgba(255,255,255,.14);
      --ink:#eaf2f6; --ink-2:#8fa8b6; --ink-3:#5d7683;
      --brand:#0891b2; --brand-2:#06b6d4; --brand-deep:#0e5b6e; --brand-soft:rgba(8,145,178,.14);
      --ok:#10b981; --err:#f87171; --err-bg:rgba(248,113,113,.12);
      --ff-d:'Space Grotesk',system-ui,sans-serif; --ff-b:'Inter',system-ui,sans-serif; --ff-m:'JetBrains Mono',monospace;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:var(--bg);color:var(--ink);font-family:var(--ff-b);-webkit-font-smoothing:antialiased;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:32px 20px;position:relative;overflow:hidden}

    /* ambient sensor-network background */
    .bg-net{position:fixed;inset:0;z-index:0;opacity:.5;pointer-events:none}
    .bg-glow{position:fixed;inset:0;z-index:0;pointer-events:none;
      background:
        radial-gradient(1200px 600px at 15% 0%, rgba(8,145,178,.16), transparent 55%),
        radial-gradient(900px 500px at 100% 100%, rgba(14,91,110,.22), transparent 50%),
        radial-gradient(600px 600px at 50% 120%, rgba(6,182,212,.10), transparent 60%);}
    .bg-grid{position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.35;
      background-image:linear-gradient(rgba(255,255,255,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.03) 1px,transparent 1px);
      background-size:52px 52px;
      mask-image:radial-gradient(ellipse 80% 80% at 50% 40%,#000 30%,transparent 75%)}

    .shell{position:relative;z-index:2;width:100%;max-width:420px}

    /* top: logo + status */
    .top{display:flex;align-items:center;justify-content:space-between;margin-bottom:26px}
    .brand{display:flex;align-items:center;gap:11px}
    .brand-logo{width:40px;height:40px;border-radius:11px;background:linear-gradient(150deg,var(--panel-2),var(--panel));border:1px solid var(--line-2);display:grid;place-items:center;box-shadow:0 6px 18px rgba(0,0,0,.4),inset 0 1px 0 rgba(255,255,255,.06)}
    .brand-logo img{width:26px;height:26px;object-fit:contain}
    .brand-txt .n{font-family:var(--ff-d);font-size:17px;font-weight:600;letter-spacing:-.01em;line-height:1}
    .brand-txt .t{font-size:10px;font-weight:600;letter-spacing:.13em;text-transform:uppercase;color:var(--brand-2);margin-top:3px}
    .status-pill{display:inline-flex;align-items:center;gap:7px;font-family:var(--ff-m);font-size:10.5px;font-weight:500;color:#7fe0c6;background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.25);padding:6px 11px;border-radius:100px}
    .status-pill .dot{width:6px;height:6px;border-radius:50%;background:var(--ok);box-shadow:0 0 0 3px rgba(16,185,129,.2);animation:pulse 2.4s ease-in-out infinite}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

    /* card */
    .card{position:relative;background:linear-gradient(180deg,rgba(18,39,51,.9),rgba(10,26,36,.92));border:1px solid var(--line);border-radius:20px;padding:32px 30px;backdrop-filter:blur(20px);box-shadow:0 30px 70px -20px rgba(0,0,0,.7),inset 0 1px 0 rgba(255,255,255,.05)}
    .card::before{content:"";position:absolute;top:0;left:22px;right:22px;height:1px;background:linear-gradient(90deg,transparent,var(--brand),transparent);opacity:.8}

    .eyebrow{display:inline-flex;align-items:center;gap:7px;font-family:var(--ff-m);font-size:10.5px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-3);margin-bottom:14px}
    .eyebrow .d{width:5px;height:5px;border-radius:50%;background:var(--brand-2)}
    h1{font-family:var(--ff-d);font-size:26px;font-weight:600;letter-spacing:-.02em;line-height:1.1}
    .sub{color:var(--ink-2);font-size:13.5px;margin:7px 0 26px;line-height:1.5}

    .field{margin-bottom:16px}
    .field label{display:block;font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-3);margin-bottom:7px}
    .inp-wrap{position:relative;display:flex;align-items:center}
    .inp-wrap .lead{position:absolute;left:13px;color:var(--ink-3);display:grid;place-items:center;pointer-events:none}
    .inp-wrap .lead svg{width:16px;height:16px}
    .field-inp{width:100%;padding:12px 14px 12px 40px;background:rgba(0,0,0,.28);border:1px solid var(--line-2);border-radius:11px;color:var(--ink);font-family:inherit;font-size:14px;transition:.16s}
    .field-inp::placeholder{color:var(--ink-3)}
    .field-inp:focus{outline:none;border-color:var(--brand);background:rgba(0,0,0,.4);box-shadow:0 0 0 3px var(--brand-soft)}
    .pw-tog{position:absolute;right:8px;background:none;border:none;color:var(--ink-3);cursor:pointer;padding:8px;display:grid;place-items:center}
    .pw-tog:hover{color:var(--brand-2)}

    .row{display:flex;align-items:center;justify-content:space-between;margin:2px 0 22px}
    .chk{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--ink-2);cursor:pointer;user-select:none}
    .chk-box{width:16px;height:16px;accent-color:var(--brand);cursor:pointer}
    .link{color:var(--brand-2);font-size:13px;font-weight:500;text-decoration:none}
    .link:hover{text-decoration:underline}

    .btn-submit{width:100%;padding:13px;border-radius:100px;background:linear-gradient(180deg,var(--brand-2),var(--brand));color:#fff;border:none;font-family:var(--ff-d);font-size:14.5px;font-weight:600;cursor:pointer;transition:.16s;box-shadow:0 8px 20px -6px rgba(8,145,178,.5);display:flex;align-items:center;justify-content:center;gap:8px}
    .btn-submit:hover:not(:disabled){filter:brightness(1.08);box-shadow:0 10px 26px -6px rgba(8,145,178,.6)}
    .btn-submit:disabled{opacity:.8;cursor:default}
    .spinner{width:15px;height:15px;border:2px solid rgba(255,255,255,.35);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;display:inline-block}
    @keyframes spin{to{transform:rotate(360deg)}}

    .msg{display:none;align-items:flex-start;gap:9px;margin-top:16px;padding:11px 13px;border-radius:11px;font-size:13px;line-height:1.45}
    .msg.error{display:flex;background:var(--err-bg);color:#fca5a5;border:1px solid rgba(248,113,113,.25)}
    .msg.success{display:flex;background:rgba(16,185,129,.12);color:#6ee7b7;border:1px solid rgba(16,185,129,.25)}

    .foot{display:flex;align-items:center;justify-content:space-between;margin-top:20px;padding-top:18px;border-top:1px solid var(--line);font-family:var(--ff-m);font-size:10.5px;color:var(--ink-3)}
    .foot .t{color:var(--ink-2)}
    .version{text-align:center;font-family:var(--ff-m);font-size:10px;color:var(--ink-3);margin-top:20px;opacity:.7}

    @media(max-width:480px){.card{padding:26px 20px}h1{font-size:22px}}
  </style>
</head>
<body>
  <div class="bg-glow"></div>
  <div class="bg-grid"></div>
  <svg class="bg-net" viewBox="0 0 1440 900" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
    <g stroke="#0891b2" stroke-width="1" fill="none" opacity="0.4">
      <path d="M120,180 L360,180 L360,420 L620,420"/>
      <path d="M360,420 L360,660 L180,660 L180,820"/>
      <path d="M620,420 L880,420 L880,220 L1120,220"/>
      <path d="M880,420 L880,680 L1180,680"/>
      <path d="M1120,220 L1320,220 L1320,480"/>
      <path d="M620,420 L620,700 L900,700"/>
    </g>
    <g fill="#06b6d4">
      <circle cx="120" cy="180" r="4"><animate attributeName="opacity" values="0.3;1;0.3" dur="3s" repeatCount="indefinite"/></circle>
      <circle cx="360" cy="420" r="5"><animate attributeName="opacity" values="1;0.3;1" dur="4s" repeatCount="indefinite"/></circle>
      <circle cx="620" cy="420" r="5"><animate attributeName="opacity" values="0.4;1;0.4" dur="3.5s" repeatCount="indefinite"/></circle>
      <circle cx="880" cy="420" r="4"><animate attributeName="opacity" values="1;0.4;1" dur="2.8s" repeatCount="indefinite"/></circle>
      <circle cx="1120" cy="220" r="4"><animate attributeName="opacity" values="0.3;1;0.3" dur="4.2s" repeatCount="indefinite"/></circle>
      <circle cx="1180" cy="680" r="4"><animate attributeName="opacity" values="1;0.3;1" dur="3.3s" repeatCount="indefinite"/></circle>
      <circle cx="180" cy="820" r="4"><animate attributeName="opacity" values="0.4;1;0.4" dur="3.8s" repeatCount="indefinite"/></circle>
      <circle cx="1320" cy="480" r="4"><animate attributeName="opacity" values="0.3;1;0.3" dur="3s" repeatCount="indefinite"/></circle>
    </g>
  </svg>

  <div class="shell">
    <div class="top">
      <div class="brand">
        <div class="brand-logo"><img src="fg-logo-dark.png" alt="FlowGuard"></div>
        <div class="brand-txt">
          <div class="n">FlowGuard</div>
          <div class="t">Ops Center</div>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="eyebrow"><span class="d"></span> Secure access</div>
      <h1>Operations Center</h1>
      <p class="sub">Sign in to monitor the Sentinel Network, dispatch teams, and control the full deployment pipeline.</p>

      <form id="lform" novalidate>
        <div class="field">
          <label for="email">Email address</label>
          <div class="inp-wrap">
            <span class="lead"><svg fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg></span>
            <input type="email" id="email" class="field-inp" placeholder="you@yourorg.com" autocomplete="email" required>
          </div>
        </div>

        <div class="field">
          <label for="password">Password</label>
          <div class="inp-wrap">
            <span class="lead"><svg fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg></span>
            <input type="password" id="password" class="field-inp" placeholder="Your password" autocomplete="current-password" required>
            <button type="button" class="pw-tog" id="pwtog" aria-label="Show password">
              <svg id="eye-svg" width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
              </svg>
            </button>
          </div>
        </div>

        <div class="row">
          <label class="chk"><input type="checkbox" id="remme" class="chk-box"> Keep me signed in</label>
          <a href="forgot-password.html" class="link">Forgot password?</a>
        </div>

        <button type="submit" class="btn-submit" id="sbtn">
          <span class="btn-text">Sign in to Operations Center</span>
        </button>

        <div class="msg" id="fmsg" role="alert" aria-live="assertive">
          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" style="flex-shrink:0;margin-top:1px;">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/>
          </svg>
          <span id="fmsg-text"></span>
        </div>
      </form>

      <div class="foot">
        <span>Local time · <span class="t" id="ltime">--:--</span></span>
        <span>Build v3.2.0</span>
      </div>
    </div>

    <p class="version">© 2026 FlowGuard Solutions · Stratum Infrastructure Group</p>
  </div>

<script>
  // Clock
  function tick() {
    const el = document.getElementById('ltime');
    if (el) el.textContent = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  }
  tick(); setInterval(tick, 30000);

  // Password toggle
  document.getElementById('pwtog').addEventListener('click', function() {
    const pw = document.getElementById('password');
    const show = pw.type === 'password';
    pw.type = show ? 'text' : 'password';
    this.setAttribute('aria-label', show ? 'Hide password' : 'Show password');
    document.getElementById('eye-svg').innerHTML = show
      ? '<path stroke-linecap="round" stroke-linejoin="round" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/>'
      : '<path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>';
  });

  // Messages
  function showMsg(txt, type) {
    const box = document.getElementById('fmsg');
    box.className = 'msg ' + type;
    document.getElementById('fmsg-text').textContent = txt;
  }
  function clearMsg() { document.getElementById('fmsg').className = 'msg'; }

  // Submit
  document.getElementById('lform').addEventListener('submit', async function(e) {
    e.preventDefault(); clearMsg();
    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const remember = document.getElementById('remme').checked;
    const btn  = document.getElementById('sbtn');
    const btxt = btn.querySelector('.btn-text');
    if (!email || !password) { showMsg('Please enter your email and password.', 'error'); return; }
    btn.disabled = true;
    btxt.innerHTML = '<span class="spinner"></span>Authenticating…';
    try {
      const r = await fetch('https://api.flowguard.ng/api/v1/auth/login', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });
      const d = await r.json();
      if (d.success) {
        const store = remember ? localStorage : sessionStorage;
        store.setItem('token', d.data.token);
        store.setItem('user', JSON.stringify(d.data.user));
        if (!remember) { localStorage.removeItem('token'); localStorage.removeItem('user'); }
        btxt.innerHTML = '✓ &nbsp;Access granted';
        showMsg('Authenticated. Loading your workspace…', 'success');
        const dest = d.data.user.role === 'field_team' ? 'field.html' : 'index.html';
        setTimeout(() => window.location.href = dest, 800);
      } else {
        btn.disabled = false;
        btxt.textContent = 'Sign in to Operations Center';
        showMsg(d.error || 'Invalid credentials. Please try again.', 'error');
      }
    } catch {
      btn.disabled = false;
      btxt.textContent = 'Sign in to Operations Center';
      showMsg('Connection failed. Check your network and retry.', 'error');
    }
  });
</script>
</body>
</html>
